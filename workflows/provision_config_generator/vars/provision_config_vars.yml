# ============================================================================
# COMPONENT_SPECIFIC_FILTERS Parameter Documentation
# ============================================================================
#
# To generate all provisioned devices, omit `config` entirely.
# When `config` is present, only `component_specific_filters` is supported.
#
# components_list rules:
# - Valid values are "wired" and "wireless"
# - If filter blocks are present, missing component names are auto-added
# - If no filter block is present, components_list should be non-empty

# ============================================================================
# Component Filter Details
# ============================================================================
#
# components_list Options:
# - "wired"    : Generate configuration for wired devices only
# - "wireless" : Generate configuration for wireless devices only
# - ["wired", "wireless"] : Generate both components
#
# Sub-Filter Options for Specific Device Selection:
#
# WIRED Sub-Filters:
# - wired:
#     - management_ip_address:
#         - "10.195.243.9"
#       Description: Filter by device management IP address
#     - site_name_hierarchy:
#         - "Global/USA/San_Jose/Building_1"
#       Description: Filter by site hierarchy paths (list of sites)
#     - device_family:
#         - "Switches and Hubs"
#       Description: Filter by device family type
#       Valid Values: "Switches and Hubs", "Routers"
#
# WIRELESS Sub-Filters:
# - wireless:
#     - management_ip_address:
#         - "10.195.243.20"
#       Description: Filter by device management IP address
#     - site_name_hierarchy:
#         - "Global/USA/San_Jose/Building_1"
#       Description: Filter by site hierarchy paths (list of sites)
#     - device_family:
#         - "Wireless Controller"
#       Description: Filter by device family type
#       Valid Values: "Wireless Controller"
#
# Combined Sub-Filters Usage:
# - Multiple sub-filter entries can be used for precise filtering
# - Each device type supports management_ip_address, site_name_hierarchy, device_family
# - Filters are applied as OR conditions within the same component type

# ============================================================================
# FILE_MODE Parameter Documentation
# ============================================================================
#
# file_mode: overwrite (default)
#   - Creates a new file or replaces the existing file entirely
#   - Each task run starts fresh
#
# file_mode: append
#   - Appends generated content to the existing file
#   - Useful for combining multiple device types into a single playbook
#   - Example use case: Run wired extraction first, then append wireless into the same file

# ============================================================================
# File Path Behavior
# ============================================================================
#
# If file_path is specified:
# - Uses the exact path provided
# - Creates directory structure if it doesn't exist
# - Overwrites existing file (or appends if file_mode: append)
#
# If file_path is NOT specified:
# - Auto-generates filename in current working directory
# - Format: provision_playbook_config_<YYYY-MM-DD_HH-MM-SS>.yml
# - Example: provision_playbook_config_2026-01-24_12-33-20.yml

# ============================================================================
# Notes and Limitations
# ============================================================================

# 1. Network Connectivity: Requires HTTPS connectivity to Catalyst Center
# 2. File Permissions: Ensure write access to specified file paths
# 3. Component Validation: Only "wired" and "wireless" are valid component values
# 4. Configuration Scope: Only retrieves existing provisioned devices (brownfield)
# 5. Site Hierarchy: site_name_hierarchy must match exact hierarchy in Catalyst Center
# 6. Device Family: device_family values are case-sensitive
# 7. Authentication: Uses Catalyst Center credentials from inventory configuration
# 8. Append Mode: Ensure the target file has correct YAML structure before appending
# ============================================================================
