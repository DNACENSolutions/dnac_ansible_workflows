# ============================================================================
# Cisco Catalyst Center Provision Playbook Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/provision_config_generator/playbook/provision_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/provision_config_generator/vars/provision_config_vars.yml
#
# ============================================================================

provision_playbook_config:
  file_path: "provision/combined_components_filter.yml"
  file_mode: overwrite
  config:
    component_specific_filters:
      components_list: ["wired", "wireless"]
      wired:
        - site_name_hierarchy:
            - "Global/India/Bangalore/bld1"
          device_family:
            - "Routers"
      wireless:
        - site_name_hierarchy:
            - "Global/USA/SAN JOSE/SJ_BLD23"
          device_family:
            - "Wireless Controller"

