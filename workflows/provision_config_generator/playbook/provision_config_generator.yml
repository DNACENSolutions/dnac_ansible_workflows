---
# ============================================================================
# Cisco Catalyst Center Provision Playbook Config Generator
# ============================================================================
#
# Description:
#   Generates YAML playbook configurations for provisioned devices from
#   Cisco Catalyst Center. The generated YAML is compatible with the
#   provision_workflow_manager module.
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/provision_config_generator/playbook/provision_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/provision_config_generator/vars/provision_config_vars.yml
#
# ============================================================================

- name: Generate Provision playbook Configuration
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no
  
  vars:
    state: gathered
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalyst_center_version | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(catalystcenter_verify) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(catalystcenter_debug) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(catalystcenter_log) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default(catalystcenter_log_level) }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path | default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append | default(True) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout | default(1200) }}"

  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that provision_playbook_config is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'provision_playbook_config' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: provision_playbook_config is not defined
    
    - name: Playbook start time for provision playbook configuration generation
      ansible.builtin.set_fact:
        config_gen_start: "{{ now() }}"

    - name: Generate YAML configuration for provisioned devices
      cisco.catalystcenter.provision_playbook_config_generator:
        <<: *catalyst_center_login
        state: "{{ state }}"
        file_path: "{{ provision_playbook_config.file_path | default(omit) }}"
        file_mode: "{{ provision_playbook_config.file_mode | default('overwrite') }}"
        config: >-
          {{
            provision_playbook_config.config
            if ((provision_playbook_config.config | default({})) | length > 0)
            else omit
          }}
      when:
        - provision_playbook_config is defined
      register: config_generation_result_0

    # - name: Display configuration generation results (config 3)
    #   debug:
    #     var: config_generation_result_3
    #   when: config_generation_result_3 is defined

    # - name: Display configuration generation results (config 4)
    #   debug:
    #     var: config_generation_result_4
    #   when: config_generation_result_4 is defined

    # - name: Display configuration generation results (config 5)
    #   debug:
    #     var: config_generation_result_5
    #   when: config_generation_result_5 is defined

    # - name: Display configuration generation results (config 6)
    #   debug:
    #     var: config_generation_result_6
    #   when: config_generation_result_6 is defined

    # - name: Display configuration generation results (config 7)
    #   debug:
    #     var: config_generation_result_7
    #   when: config_generation_result_7 is defined

    # - name: Display configuration generation results (config 8)
    #   debug:
    #     var: config_generation_result_8
    #   when: config_generation_result_8 is defined

    # - name: Display configuration generation results (config 9)
    #   debug:
    #     var: config_generation_result_9
    #   when: config_generation_result_9 is defined

    # - name: Display configuration generation results (config 10)
    #   debug:
    #     var: config_generation_result_10
    #   when: config_generation_result_10 is defined

    # - name: Display configuration generation results (config 11)
    #   debug:
    #     var: config_generation_result_11
    #   when: config_generation_result_11 is defined

    # - name: Display configuration generation results (config 12)
    #   debug:
    #     var: config_generation_result_12
    #   when: config_generation_result_12 is defined

    # - name: Display configuration generation results (config 13)
    #   debug:
    #     var: config_generation_result_13
    #   when: config_generation_result_13 is defined

    # - name: Display configuration generation results (config 14)
    #   debug:
    #     var: config_generation_result_14
    #   when: config_generation_result_14 is defined

    # - name: Display configuration generation results (config 15)
    #   debug:
    #     var: config_generation_result_15
    #   when: config_generation_result_15 is defined

    # =========================================================================
    # Playbook Execution Summary
    # =========================================================================
    - name: Playbook end time
      ansible.builtin.set_fact:
        config_gen_end: "{{ now() }}"
    
    - name: Print playbook execution time
      ansible.builtin.debug:
        msg: "Provision configuration generation playbook run time: start: {{ config_gen_start }}, end: {{ config_gen_end }}"
