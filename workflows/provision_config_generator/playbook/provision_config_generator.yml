---
# ============================================================================
# Cisco Catalyst Center Brownfield Provision Playbook Config Generator
# ============================================================================
#
# Description:
#   Generates YAML playbook configurations for existing provisioned devices
#   from Cisco Catalyst Center. Extracts provisioning configurations and
#   converts them into Ansible-compatible YAML files.
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/provision_playbook_config_generator/playbook/provision_playbook_config_generator_playbook.yml \
#     --extra-vars VARS_FILE_PATH=../vars/provision_playbook_config_generator_vars.yml
#
# ============================================================================

- name: Generate Provision playbook Configuration
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no

  vars_files:
    - "{{ VARS_FILE_PATH }}"
  
  vars:
    state: gathered
    catalyst_center_login: &catalyst_center_login
      dnac_host: "{{ catalyst_center_host | default(dnac_host) }}"
      dnac_username: "{{ catalyst_center_username | default(dnac_username) }}"
      dnac_password: "{{ catalyst_center_password | default(dnac_password) }}"
      dnac_version: "{{ catalyst_center_version | default(dnac_version) }}"
      dnac_port: "{{ catalyst_center_port | default(443) }}"
      dnac_verify: "{{ catalyst_center_verify | default(dnac_verify) }}"
      dnac_debug: "{{ catalyst_center_debug | default(dnac_debug) }}"
      dnac_log: "{{ catalyst_center_log | default(dnac_log) }}"
      dnac_log_level: "{{ catalyst_center_log_level | default(dnac_log_level) }}"
      dnac_log_file_path: "{{ catalyst_center_log_file_path | default(omit) }}"
      dnac_log_append: "{{ catalyst_center_log_append | default(True) }}"
      dnac_api_task_timeout: "{{ catalyst_center_api_task_timeout | default(1200) }}"

  tasks:
    - name: Print VARS_FILE_PATH
      debug:
        msg: "Input file selected: {{ VARS_FILE_PATH }}"
    
    - name: Playbook start time for provision playbook configuration generation
      set_fact:
        config_gen_start: "{{ now() }}"

    # =========================================================================
    # Generate Provision Playbook Configuration (Config 0)
    # =========================================================================
    - name: Generate YAML configuration for provision (provision_playbook_config)
      cisco.dnac.provision_playbook_config_generator:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config: "{{ provision_playbook_config }}"
      when:
        - provision_playbook_config is defined
      register: config_generation_result_0

