---
# Playbook for LAN Automation on Cisco Catalyst Center
- name: Cisco Catalyst Center LAN Automation
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no


  vars:
    state: merged
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalyst_center_version  | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(catalystcenter_verify) }}"
      config_verify: "{{ catalyst_center_config_verify | default(False) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(False) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(False) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path |  default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append |  default(False) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout |  default(1200) }}"
      
  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that lan_automation_details is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'lan_automation_details' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: lan_automation_details is not defined

    - name: Set LAN Automation Start Time
      set_fact:
        long_op_start: "{{ now() }}"

    - name: Run LAN Automation Workflows
      cisco.catalystcenter.lan_automation_workflow_manager:
        <<: *catalyst_center_login
        config: 
          - "{{ item }}"
      loop: "{{ lan_automation_details.lan_automation_session }}"
      when: lan_automation_details.lan_automation_session is defined
      register: lan_automation_output

    - name: Print LAN Automation Output
      debug:
        msg: "{{ lan_automation_output }}"
      when: lan_automation_output is defined

    - name: Update LAN Automated devices
      cisco.catalystcenter.lan_automation_workflow_manager:
        <<: *catalyst_center_login
        config: 
          - "{{ item }}"
      register: loopback_update_output
      loop: "{{ lan_automation_details.device_update }}"
      when: lan_automation_details.device_update is defined

    # Port Channel Create/Update
    - name: Create/Update Port Channel Configuration
      cisco.catalystcenter.lan_automation_workflow_manager:
        <<: *catalyst_center_login
        config:
          - port_channel: "{{ lan_automation_details.port_channel }}"
      register: port_channel_output
      when: 
        - lan_automation_details is defined
        - lan_automation_details.port_channel is defined

    - name: Print Loopback Update Output
      debug:
        msg: "{{ loopback_update_output }}"
      when: loopback_update_output is defined

    - name: Set LAN Automation End Time
      set_fact:
        long_op_end: "{{ now() }}"

    - name: Print LAN Automation Execution Time
      debug:
        msg: "LAN Automation runtime: Start {{ long_op_start }}, End {{ long_op_end }}"

    - name: Check Python Version on Catalyst Center Host
      ansible.builtin.command: which python
      register: ansible_play_path
      delegate_to: catalyst_center_hosts
      connection: local

