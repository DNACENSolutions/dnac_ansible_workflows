---
# ============================================================================
# Cisco Catalyst Center - Discovery Playbook Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/discovery_playbook_config_generator/playbook/discovery_playbook_config_generator_playbook.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/discovery_playbook_config_generator/vars/discovery_playbook_config_generator_inputs.yml
#
# MODULE:  cisco.dnac.discovery_playbook_config_generator
# AUTHOR:  Megha Kandari, Madhan Sankaranarayanan
# VERSION: 6.44.0
# MIN CC:  2.3.7.9
#
# NOTE: discovery_playbook_config_generator_details is a dict (not a list).
#       Only ONE configuration can be active per playbook execution.
#       Uncomment the desired use case and comment out the others.
# ============================================================================

# --------------------------------------------------------------------------
# Use Case 1: Generate ALL discovery configurations
# Description: Retrieves ALL discovery tasks from Catalyst Center regardless
#              of type or name. global_filters are ignored when this is true.
# --------------------------------------------------------------------------
discovery_playbook_config_generator_details:
  generate_all_configurations: true
  file_path: "/tmp/complete_discovery_config.yml"

# --------------------------------------------------------------------------
# Use Case 2: generate_all_configurations false with global_filters
# Description: Explicitly set to false — global_filters are required.
#              Filters by LLDP discovery type only.
# --------------------------------------------------------------------------
# discovery_playbook_config_generator_details:
#   generate_all_configurations: false
#   file_path: "/tmp/lldp_discovery_config.yml"
#   global_filters:
#     discovery_type_list:
#       - "LLDP"

# --------------------------------------------------------------------------
# Use Case 3: Filter by discovery name list (HIGHEST PRIORITY)
# Description: Extracts only discoveries with exact matching names.
#              discovery_type_list is ignored when names are provided.
# --------------------------------------------------------------------------
# discovery_playbook_config_generator_details:
#   file_path: "/tmp/specific_discoveries.yml"
#   file_mode: overwrite
#   global_filters:
#     discovery_name_list:
#       - "Range Discovery"
#       - "Single Discovery"

# --------------------------------------------------------------------------
# Use Case 4: Filter by a single discovery name
# --------------------------------------------------------------------------
# discovery_playbook_config_generator_details:
#   file_path: "/tmp/single_name_discovery.yml"
#   global_filters:
#     discovery_name_list:
#       - "Range Discovery"

# --------------------------------------------------------------------------
# Use Case 5: Filter by discovery type - Single only
# --------------------------------------------------------------------------
# discovery_playbook_config_generator_details:
#   file_path: "/tmp/single_type_discoveries.yml"
#   global_filters:
#     discovery_type_list:
#       - "Single"

# --------------------------------------------------------------------------
# Use Case 6: Filter by discovery type - Range only
# --------------------------------------------------------------------------
# discovery_playbook_config_generator_details:
#   file_path: "/tmp/range_type_discoveries.yml"
#   global_filters:
#     discovery_type_list:
#       - "Range"

# --------------------------------------------------------------------------
# Use Case 8: Filter by discovery type - LLDP only
# --------------------------------------------------------------------------
# discovery_playbook_config_generator_details:
#   file_path: "/tmp/lldp_type_discoveries.yml"
#   global_filters:
#     discovery_type_list:
#       - "LLDP"

# --------------------------------------------------------------------------
# Use Case 9: Filter by discovery type - CIDR only
# --------------------------------------------------------------------------
# discovery_playbook_config_generator_details:
#   file_path: "/tmp/cidr_type_discoveries.yml"
#   global_filters:
#     discovery_type_list:
#       - "CIDR"

# --------------------------------------------------------------------------
# Use Case 10: Filter by multiple discovery types - CIDR and LLDP
# Description: Extracts all CIDR and LLDP type discoveries.
#              Uses append mode to combine into an existing file.
# --------------------------------------------------------------------------
# discovery_playbook_config_generator_details:
#   file_path: "/tmp/cidr_lldp_discoveries.yml"
#   file_mode: append
#   global_filters:
#     discovery_type_list:
#       - "CIDR"
#       - "LLDP"

# --------------------------------------------------------------------------
# Use Case 11: Filter by multiple discovery types - Single and Range
# --------------------------------------------------------------------------
# discovery_playbook_config_generator_details:
#   file_path: "/tmp/single_range_discoveries.yml"
#   global_filters:
#     discovery_type_list:
#       - "Single"
#       - "Range"

# --------------------------------------------------------------------------
# Use Case 12: Filter by multiple discovery types - Range, LLDP and CIDR
# --------------------------------------------------------------------------
# discovery_playbook_config_generator_details:
#   file_path: "/tmp/range_lldp_cidr_discoveries.yml"
