# --------------------------------------------------------------------------
# Use Case 13: Name filter takes priority over type filter
# Description: Both discovery_name_list and discovery_type_list provided.
#              discovery_name_list has HIGHEST PRIORITY — type list ignored.
# --------------------------------------------------------------------------
# discovery_playbook_config_generator_details:
#   file_path: "/tmp/name_priority_over_type.yml"
#   global_filters:
#     discovery_name_list:
#       - "Range Discovery"
#     discovery_type_list:
#       - "CIDR"   # <-- IGNORED because discovery_name_list is provided

# --------------------------------------------------------------------------
# Use Case 15: Auto-generated filename (no file_path specified)
# Description: File saved to current directory as:
#              discovery_playbook_config_<YYYY-MM-DD_HH-MM-SS>.yml
# --------------------------------------------------------------------------
# discovery_playbook_config_generator_details:
#   generate_all_configurations: true


# ============================================================================
# GENERATE_ALL_CONFIGURATIONS Parameter Documentation
# ============================================================================
#
# BEHAVIOR WHEN TRUE:
# - Retrieves ALL discovery tasks from Catalyst Center
# - IGNORES any global_filters settings (name list and type list are ignored)
# - Includes discoveries regardless of current status
# - Useful for complete brownfield discovery infrastructure documentation
#
# BEHAVIOR WHEN FALSE (or not specified):
# - global_filters with at least one of discovery_name_list or
#   discovery_type_list MUST be provided
# - Failure when neither is provided:
#   "Minimum requirements validation FAILED for configuration..."


# ============================================================================
# GLOBAL_FILTERS Priority Documentation
# ============================================================================
#
# discovery_name_list: HIGHEST PRIORITY
# - Exact case-sensitive match against discovery task names in Catalyst Center
# - When provided, discovery_type_list is completely ignored
# - Invalid/non-existent names produce no output for that name (silently skipped)
# - Empty list [] treated as no filter (all discoveries included)
# - Example: ["Range Discovery","Single Discovery"]
#
# discovery_type_list: LOWER PRIORITY
# - Only applied when discovery_name_list is NOT provided
# - Valid values: Single, Range, CDP, LLDP, CIDR (case-insensitive internally)
# - Invalid type values cause module validation failure
# - Empty list [] treated as no filter (all discoveries included)
# - Example: ["CDP", "LLDP"]


# ============================================================================
# FILE_MODE Documentation
# ============================================================================
#
# overwrite (default):
# - Creates a new file or completely replaces an existing file
# - Each run starts fresh — previous content is lost
# - Use when you want a clean output for each generation
#
# append:
# - Adds generated content to the end of an existing file
# - Writes a new YAML document block (---) separator before each append
# - Use when building a combined file from multiple filtered runs
# - Useful for aggregating different discovery types into one file


# ============================================================================
# FILE_PATH Documentation
# ============================================================================
#
# If file_path IS specified:
# - Uses the exact path provided (absolute or relative)
# - Creates parent directory structure if it does not exist
# - Behaviour controlled by file_mode (overwrite or append)
#
# If file_path is NOT specified:
# - Auto-generates filename in current working directory
# - Format: discovery_playbook_config_<YYYY-MM-DD_HH-MM-SS>.yml
# - Example: discovery_playbook_config_2026-01-24_12-33-20.yml


# ============================================================================
# Notes and Limitations
# ============================================================================
#
# 1. Minimum CC Version : Catalyst Center >= 2.3.7.9 required
# 2. Network Connectivity: Requires HTTPS connectivity to Catalyst Center
# 3. File Permissions   : Ensure write access to specified file paths
# 4. State Support      : Only 'gathered' state is supported
# 5. Configuration Scope: Only retrieves existing configurations (brownfield)
# 6. Authentication     : Uses Catalyst Center credentials from inventory
# ============================================================================
