# ============================================================================
# Cisco Catalyst Center SDA Fabric Devices Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/sda_fabric_devices_config_generator/playbook/sda_fabric_devices_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/sda_fabric_devices_config_generator/vars/sda_fabric_devices_config_inputs.yml
#
# Module used:
#   cisco.dnac.sda_fabric_devices_playbook_config_generator
# ============================================================================

sda_fabric_devices_config:
  # 1) Generate all fabric devices from all fabric sites
  - generate_all_configurations: true
    file_path: "/tmp/sda_fabric_devices_complete_config.yml"

  # 2) Generate all fabric devices for a specific fabric site
  - file_path: "/tmp/sda_fabric_devices_by_fabric.yml"
    component_specific_filters:
      components_list: ["fabric_devices"]
      fabric_devices:
        fabric_name: "Global/USA/SAN JOSE"

  # 3) Generate specific device in a fabric
  - file_path: "/tmp/sda_fabric_device_by_ip.yml"
    component_specific_filters:
      components_list: ["fabric_devices"]
      fabric_devices:
        fabric_name: "Global/USA/SAN JOSE"
        device_ip: "10.10.10.21"

  # 4) Generate devices by roles in a fabric
  - file_path: "/tmp/sda_fabric_devices_by_role.yml"
    file_mode: "append"
    component_specific_filters:
      components_list: ["fabric_devices"]
      fabric_devices:
        fabric_name: "Global/USA/SAN JOSE"
        device_roles:
          - "BORDER_NODE"
          - "EDGE_NODE"

# ============================================================================
# Notes
# ============================================================================
# - If component_specific_filters is omitted, the workflow omits module config
#   and runs in full discovery mode.
# - If fabric_devices filter is provided without components_list, the module
#   auto-adds fabric_devices to components_list internally.
# ============================================================================
