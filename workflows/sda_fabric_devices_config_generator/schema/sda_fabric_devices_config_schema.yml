# Catalyst Center SDA Fabric Devices Config Generator Schema
# ===================================================================================
#
# This schema defines the configuration structure for generating YAML playbook
# configurations from existing SDA fabric device assignments and handoff settings
# using the sda_fabric_devices_playbook_config_generator module.
#
# SCHEMA OVERVIEW:
# ---------------
# The schema supports configuration generation operations for:
# 1. Fabric Device Configurations - Extract existing SDA fabric device configuration
# 2. Fabric Site Filtering - Filter by fabric hierarchy path (fabric_name)
# 3. Device IP Filtering - Retrieve a specific device within a fabric
# 4. Device Role Filtering - Retrieve devices by one or more SDA roles
# 5. Multi-Fabric Filtering - Combine multiple fabric filters (OR across entries)
# 6. Full Brownfield Export - Retrieve all fabric devices across all fabrics
#
# USAGE:
# ------
# This schema validates YAML configuration files for automating the extraction
# and generation of SDA fabric device configurations from existing Catalyst Center
# deployments (brownfield scenarios).
#
# TOP-LEVEL PARAMETERS:
# -------------------
# catalyst_center_version:           Catalyst Center version (optional, overrides host file)
# catalyst_center_verify:            SSL certificate verification (optional, default: false)
# catalyst_center_api_task_timeout:  API task timeout in seconds (optional, default: 1200)
# catalyst_center_debug:             Enable debug mode (optional, default: false)
# catalyst_center_log:               Enable logging (optional, default: false)
# catalyst_center_log_append:        Append to log file (optional, default: true)
# catalyst_center_log_file_path:     Log file path (optional, default: 'dnac.log')
# catalyst_center_log_level:         Log level (CRITICAL, ERROR, WARNING, INFO, DEBUG)
# catalyst_center_config_verify:     Configuration verification (optional, default: false)
#
# sda_fabric_devices_config SECTION:
# ---------------------------------
# Contains configuration for generating YAML from existing SDA infrastructure.
#
# 1. FILE_PATH:
#    - Type: string (optional)
#    - Description: Output path where generated YAML configuration is saved.
#    - If not provided, module auto-generates filename with timestamp.
#    - Format: sda_fabric_devices_playbook_config_<YYYY-MM-DD_HH-MM-SS>.yml
#
# 2. FILE_MODE:
#    - Type: string (optional)
#    - Values: overwrite, append
#    - Description: Controls whether output file is replaced or appended.
#
# 3. CONFIG:
#    - Type: dictionary (optional)
#    - Description: Passed directly to module config.
#    - If omitted, module performs full discovery.
#
# 4. COMPONENT_SPECIFIC_FILTERS in CONFIG:
#    - Type: dictionary (optional)
#    - Description: Component filters under config.
#    - components_list supports only: fabric_devices.
#    - If fabric_devices is provided without components_list, module can infer
#      and auto-populate components_list internally.
#
# 5. FABRIC_DEVICES FILTER LIST:
#    - Type: list of filter entries
#    - Multiple entries are combined using OR logic.
#    - Inside each entry, specified fields use AND logic.
#
# Schema Definition
sda_fabric_devices_config: list(include('sda_fabric_devices_config_generator_type'), min=1, max=100, required=True)

# Optional Catalyst Center connection parameters
catalyst_center_version: str(required=False)
catalyst_center_verify: bool(required=False)
catalyst_center_api_task_timeout: int(min=60, max=3600, required=False)
catalyst_center_debug: bool(required=False)
catalyst_center_log: bool(required=False)
catalyst_center_log_append: bool(required=False)
catalyst_center_log_file_path: str(required=False)
catalyst_center_log_level: str(required=False)
catalyst_center_config_verify: bool(required=False)

---
# SDA Fabric Devices Config Generator Entry Schema
sda_fabric_devices_config_generator_type:
  # Output file path
  file_path: str(required=False)

  # File write mode: overwrite (default) or append
  file_mode: enum('overwrite', 'append', required=False)

  # Config passed to module. Omit or leave empty to export all fabric devices.
  config: include('sda_fabric_devices_module_config_type', required=False)

---
# SDA Fabric Devices Module Config Schema
sda_fabric_devices_module_config_type:
  component_specific_filters: include('sda_fabric_devices_component_filters_type', required=False)

---
# SDA Fabric Devices Component Filters Schema
sda_fabric_devices_component_filters_type:
  components_list: list(enum('fabric_devices'), min=1, max=1, required=False)

  # List of fabric filter entries
  fabric_devices: list(include('sda_fabric_devices_filter_type'), min=1, max=100, required=False)

---
# SDA Fabric Devices single filter entry schema
sda_fabric_devices_filter_type:
  # Fabric hierarchy name (required for each list entry)
  fabric_name: str(required=True)

  # Optional specific device IP within the fabric
  device_ip: str(required=False)

  # Optional device role filter list
  device_roles: list(enum('CONTROL_PLANE_NODE', 'EDGE_NODE', 'BORDER_NODE', 'WIRELESS_CONTROLLER_NODE', 'EXTENDED_NODE'), min=1, max=5, required=False)
