# Schema for SDA host port onboarding playbook configuration generator workflow
#
# Module:
#   cisco.dnac.sda_host_port_onboarding_playbook_config_generator
#
# Notes:
# - This workflow supports only state='gathered'.
# - If config is omitted, the module gathers all supported components.
# - If config.component_specific_filters is provided, provide either
#   components_list or at least one component filter.

state: enum('gathered', required=False)
file_path: str(required=False)
file_mode: enum('overwrite', 'append', required=False)
config: include('generator_config_type', required=False)

catalyst_center_version: str(required=False)
catalyst_center_verify: bool(required=False)
catalyst_center_api_task_timeout: int(required=False, default=1200)
catalyst_center_debug: bool(required=False, default=False)
catalyst_center_log: bool(required=False, default=False)
catalyst_center_log_append: bool(required=False, default=True)
catalyst_center_log_file_path: str(required=False, default='dnac.log')
catalyst_center_log_level: enum('CRITICAL', 'ERROR', 'WARNING', 'INFO', 'DEBUG', required=False)
catalyst_center_config_verify: bool(required=False, default=False)
catalyst_center_task_poll_interval: int(required=False)

---
generator_config_type:
  component_specific_filters: include('component_specific_filters_type', required=False)

component_specific_filters_type:
  components_list: list(enum('port_assignments', 'port_channels', 'wireless_ssids'), required=False)
  port_assignments: include('fabric_site_filter_type', required=False)
  port_channels: include('fabric_site_filter_type', required=False)
  wireless_ssids: include('fabric_site_filter_type', required=False)

fabric_site_filter_type:
  fabric_site_name_hierarchy: list(str(), required=False)
