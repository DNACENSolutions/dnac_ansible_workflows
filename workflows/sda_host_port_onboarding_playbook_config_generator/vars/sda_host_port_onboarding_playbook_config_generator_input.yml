---
# Optional: defaults to gathered. This module supports only gathered state.
state: gathered

# Optional: output YAML file path for generated configuration.
# If omitted, module auto-generates a timestamp-based filename.
file_path: "/tmp/sda_host_port_onboarding_playbook_config.yml"

# Optional: overwrite or append generated content.
file_mode: "overwrite"

# Optional: if omitted, module gathers all host onboarding config across all fabric sites.
config:
  component_specific_filters:
    components_list:
      - port_assignments
    port_assignments:
      fabric_site_name_hierarchy:
        - "Global/California/23"

# Example: gather everything (set config to null or remove it).
# config: null
