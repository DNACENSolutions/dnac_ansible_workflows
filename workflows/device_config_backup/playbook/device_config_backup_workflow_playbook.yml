---
#the following playbook is used to Manage operation related to taking the backup of running config, static config and vlan.dat.bat
# ansible-playbook -i inventory/hosts.yml workflows/ise_radius_integration/playbook/ise_radius_integration_workflow_playbook.yml --extra-vars "VARS_FILES_PATH=../vars/ise_radius_integration_workflow_input.yml"
- name: Manage operation related to taking the backup of running config on  Cisco Catalyst Center
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no


  vars:
    state: merged
    default_catalyst_center_task_timeout: 1200
    default_catalyst_center_task_poll_interval: 60
    
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalyst_center_version  | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(catalystcenter_verify) }}"
      config_verify: "{{ catalyst_center_config_verify | default(False) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(False) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(False) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path |  default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append |  default(False) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout |  default(1200) }}"

  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that device_configs_backup_details is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'device_configs_backup_details' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: device_configs_backup_details is not defined

    - name: Playbook start time for Device configuration backup through Cisco Catalyst Center
      set_fact:
        long_op_start: "{{ now() }}"
    - name: Manage operation related to taking the backup of running config on Cisco Catalyst Center
      cisco.catalystcenter.device_configs_backup_workflow_manager:
        <<: *catalyst_center_login
        state: merged
        config: "{{device_configs_backup_details}}"
      register: device_configs_backup_output
      when: device_configs_backup_details is defined
      async: "{{ catalyst_center_task_timeout  | default(default_catalyst_center_task_timeout) }}"
      poll: "{{ catalyst_center_task_poll_interval  | default(default_catalyst_center_task_poll_interval) }}"
    - name: Print the Device configuration backup  output
      debug:
        msg: "{{device_configs_backup_output}}"
    - name: Device configuration backup  playbook end time
      set_fact:
        long_op_end: "{{ now() }}"
    - name: Print Device configuration backup  playbook execution time
      debug:
        msg: "Device configuration backup  playbook run time: {{ long_op_start }}, end: {{ long_op_end }}"
  post_tasks:
    - name: run command module to find python version
      ansible.builtin.command: which python
      register: ansible_play_path
      delegate_to: catalyst_center_hosts
      connection: local
