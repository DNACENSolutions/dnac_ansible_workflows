---
- name: Playbook to manage Cisco Catalyst Center Device Discovery
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no

  vars:
    state: merged
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalyst_center_version  | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(catalystcenter_verify) }}"
      config_verify: "{{ catalyst_center_config_verify | default(False) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(False) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(False) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path |  default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append |  default(False) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout |  default(1200) }}"

  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that discovery_details is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'discovery_details' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: discovery_details is not defined

    - name: Playbook start time for the discoveries
      set_fact:
        long_op_start: "{{ now() }}"
    - name: Discover a singe device IP Address for a list of discoveries from "{{ VARS_FILE_PATH | default('inventory / host variables') }}"
      cisco.catalystcenter.discovery_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config:
        - "{{ item }}"
      loop: "{{ discovery_details.single }}"
      when: discovery_details.single is defined

    - name: Discover devices for an IP Address Range if defined in file "{{ VARS_FILE_PATH | default('inventory / host variables') }}"
      cisco.catalystcenter.discovery_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config:
        - "{{ item }}"
      loop: "{{ discovery_details.range }}"
      when: discovery_details.range is defined

    - name: Discover Multi IP Address Ranges if defined in the file "{{ VARS_FILE_PATH | default('inventory / host variables') }}"
      cisco.catalystcenter.discovery_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config:
        - "{{ item }}"
      loop: "{{ discovery_details.multi_range }}"
      when: discovery_details.multi_range is defined

    - name: Discover devices from a CDP seed if defined in the file "{{ VARS_FILE_PATH | default('inventory / host variables') }}"
      cisco.catalystcenter.discovery_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config:
        - "{{ item }}"
      loop: "{{ discovery_details.cdp }}"
      when: discovery_details.cdp is defined

    - name: Discover devices from an LLDP seed if defined in the file "{{ VARS_FILE_PATH | default('inventory / host variables') }}"
      cisco.catalystcenter.discovery_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config:
        - "{{ item }}"
      loop: "{{ discovery_details.lldp }}"
      when: discovery_details.lldp is defined

    - name: Configure and run an CIDR Discovery if defined in the file "{{ VARS_FILE_PATH | default('inventory / host variables') }}"
      cisco.catalystcenter.discovery_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config:
        - "{{ item }}"
      loop: "{{ discovery_details.cidr }}"
      when: discovery_details.cidr is defined
    - name: Discovery playbook end time
      set_fact:
        long_op_end: "{{ now() }}"
    - name: Print Discovery playbook execution time
      debug:
        msg: "Discovery playbook run time: {{ long_op_start }}, end: {{ long_op_end }}"
  post_tasks:
    - name: run command module to find python version
      ansible.builtin.command: which python
      register: ansible_play_path
      delegate_to: catalyst_center_hosts
      connection: local