# Cisco Catalyst Center Device Credential Config Generator Schema
# ======================================================================================
#
# This schema defines the configuration structure for generating YAML playbook
# configurations from existing global and site-assigned device credentials in
# Cisco Catalyst Center using the device_credential_playbook_config_generator module.

# Schema Definition
device_credential_config: list(include('device_credential_config_generator_type'), min=1, max=100, required=True)

# Optional Catalyst Center connection parameters
catalyst_center_version: str(required=False)
catalyst_center_verify: bool(required=False)
catalyst_center_api_task_timeout: int(min=60, max=3600, required=False)
catalyst_center_debug: bool(required=False)
catalyst_center_log: bool(required=False)
catalyst_center_log_append: bool(required=False)
catalyst_center_log_file_path: str(required=False)
catalyst_center_log_level: str(required=False)
catalyst_center_config_verify: bool(required=False)

---
# Device Credential Config Generator Entry Schema
device_credential_config_generator_type:
  # Workflow-level convenience flag. If true, the playbook omits module config
  # and the module runs in full-discovery mode.
  generate_all_configurations: bool(required=False)
  file_path: str(required=False)
  file_mode: enum('overwrite', 'append', required=False)
  # Workflow-level convenience wrapper. The playbook maps this to
  # module config.component_specific_filters when filters are present.
  component_specific_filters: include('device_credential_component_filters_type', required=False)

---
# Device Credential Component Filters Schema
device_credential_component_filters_type:
  components_list: list(enum('global_credential_details', 'assign_credentials_to_site'), min=1, max=2, required=False)
  global_credential_details: include('global_credential_details_filter_type', required=False)
  assign_credentials_to_site: include('assign_credentials_to_site_filter_type', required=False)

---
# Global credential details filter schema
global_credential_details_filter_type:
  cli_credential: list(include('credential_description_filter_type'), min=1, max=500, required=False)
  https_read: list(include('credential_description_filter_type'), min=1, max=500, required=False)
  https_write: list(include('credential_description_filter_type'), min=1, max=500, required=False)
  snmp_v2c_read: list(include('credential_description_filter_type'), min=1, max=500, required=False)
  snmp_v2c_write: list(include('credential_description_filter_type'), min=1, max=500, required=False)
  snmp_v3: list(include('credential_description_filter_type'), min=1, max=500, required=False)

---
# Shared credential description filter schema
credential_description_filter_type:
  description: str(required=True)

---
# Assign credentials to site filter schema
assign_credentials_to_site_filter_type:
  site_name: list(str(), min=1, max=500, required=False)
