# ============================================================================
# Cisco Catalyst Center Device Credential Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/device_credential_config_generator/playbook/device_credential_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/device_credential_config_generator/vars/device_credential_config_inputs.yml
#
# Module used:
#   cisco.catalystcenter.device_credential_playbook_config_generator
# ============================================================================

device_credential_config:
  # 1) Generate all global credentials and site assignments
  - generate_all_configurations: true
    file_path: "/tmp/device_credential_complete_config.yml"

  # 2) Filter global credential descriptions
  - file_path: "/tmp/device_credential_global_filters.yml"
    component_specific_filters:
      components_list: ["global_credential_details"]
      global_credential_details:
        cli_credential:
          - description: "WLC_CLI"
          - description: "Router_CLI"
        https_read:
          - description: "HTTPS_Read_Admin"
        https_write:
          - description: "HTTPS_Write_Admin"
        snmp_v2c_read:
          - description: "SNMP_RO_Community"
        snmp_v2c_write:
          - description: "SNMP_RW_Community"
        snmp_v3:
          - description: "SNMPv3_Admin"

  # 3) Filter site credential assignments
  - file_path: "/tmp/device_credential_site_assignments.yml"
    component_specific_filters:
      components_list: ["assign_credentials_to_site"]
      assign_credentials_to_site:
        site_name:
          - "Global/India/Assam"
          - "Global/India/Haryana"

  # 4) Combined append export
  - file_path: "/tmp/device_credential_aggregate.yml"
    file_mode: "append"
    component_specific_filters:
      components_list:
        - "global_credential_details"
        - "assign_credentials_to_site"
      global_credential_details:
        cli_credential:
          - description: "WLC_CLI"
      assign_credentials_to_site:
        site_name: ["Global/USA/SAN JOSE"]

# ============================================================================
# Notes
# ============================================================================
# - If component_specific_filters is omitted, the workflow omits module config
#   and runs in full discovery mode.
# - If component filters are provided without components_list, the module
#   auto-populates components_list internally.
# ============================================================================
