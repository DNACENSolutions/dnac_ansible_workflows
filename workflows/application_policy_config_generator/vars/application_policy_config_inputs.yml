# ============================================================================
# Cisco Catalyst Center Application Policy Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/application_policy_config_generator/playbook/application_policy_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/application_policy_config_generator/vars/application_policy_config_inputs.yml
#
# Module used:
#   cisco.catalystcenter.application_policy_playbook_config_generator
# ============================================================================

application_policy_config:
  # --------------------------------------------------------------------------
  # 1) Generate ALL application policy configurations (full discovery)
  #    Omit config entirely → module retrieves all components
  # --------------------------------------------------------------------------
  - file_path: "application_policy_config/complete_config.yml"

  # --------------------------------------------------------------------------
  # 2) Filter queuing profiles by name
  # --------------------------------------------------------------------------
  - file_path: "application_policy_config/queuing_profiles.yml"
    config:
      component_specific_filters:
        components_list: ["queuing_profile"]
        queuing_profile:
          - profile_names_list:
              - "Enterprise-QoS-Profile"
              - "Wireless-QoS-Profile"

  # --------------------------------------------------------------------------
  # 3) Filter application policies by name
  # --------------------------------------------------------------------------
  - file_path: "application_policy_config/policies.yml"
    config:
      component_specific_filters:
        components_list: ["application_policy"]
        application_policy:
          - policy_names_list:
              - "wired_traffic_policy"
              - "wireless_traffic_policy"

  # --------------------------------------------------------------------------
  # 4) Combined queuing profiles + application policies with append mode
  # --------------------------------------------------------------------------
  - file_path: "application_policy_config/combined.yml"
    file_mode: "append"
    config:
      component_specific_filters:
        components_list:
          - "queuing_profile"
          - "application_policy"
        queuing_profile:
          - profile_names_list: ["Enterprise-QoS-Profile"]
        application_policy:
          - policy_names_list: ["wired_traffic_policy", "wireless_traffic_policy"]

# ============================================================================
# Notes
# ============================================================================
# Omit config entirely to run in full discovery mode (all components).
# When config is provided, component_specific_filters is mandatory.
# queuing_profile and application_policy filters are lists of dicts.
# The module auto-adds components to components_list when component-specific
# filter blocks are provided but components_list is omitted.
# ============================================================================
