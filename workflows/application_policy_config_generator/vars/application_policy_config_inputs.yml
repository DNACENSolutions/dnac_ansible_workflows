# ============================================================================
# Cisco Catalyst Center Application Policy Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/application_policy_config_generator/playbook/application_policy_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/application_policy_config_generator/vars/application_policy_config_inputs.yml
#
# Module used:
#   cisco.dnac.application_policy_playbook_config_generator
# ============================================================================

application_policy_config:
  # 1) Generate all queuing profiles and application policies
  - generate_all_configurations: true
    file_path: "/tmp/application_policy_complete_config.yml"

  # 2) Generate only queuing profiles
  - file_path: "/tmp/application_policy_queuing_profiles.yml"
    component_specific_filters:
      components_list: ["queuing_profile"]
      queuing_profile:
        profile_names_list:
          - "Enterprise-QoS-Profile"
          - "Wireless-QoS-Profile"

  # 3) Generate only application policies
  - file_path: "/tmp/application_policy_policies.yml"
    component_specific_filters:
      components_list: ["application_policy"]
      application_policy:
        policy_names_list:
          - "wired_traffic_policy"
          - "wireless_traffic_policy"

  # 4) Combined append export
  - file_path: "/tmp/application_policy_aggregate.yml"
    file_mode: "append"
    component_specific_filters:
      components_list:
        - "queuing_profile"
        - "application_policy"
      queuing_profile:
        profile_names_list: ["Enterprise-QoS-Profile"]
      application_policy:
        policy_names_list: ["wired_traffic_policy"]

# ============================================================================
# Notes
# ============================================================================
# - If component_specific_filters is omitted, the workflow omits module config
#   and runs in full discovery mode.
# - If component blocks are provided without components_list, the module can
#   auto-populate components_list internally.
# ============================================================================
