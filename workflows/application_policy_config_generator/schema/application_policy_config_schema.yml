# Cisco Catalyst Center Application Policy Config Generator Schema
# ======================================================================================
#
# This schema defines the configuration structure for generating YAML playbook
# configurations from existing application policies and queuing profiles in
# Cisco Catalyst Center using the application_policy_playbook_config_generator module.

# Schema Definition
application_policy_config: list(include('application_policy_config_generator_type'), min=1, max=100, required=True)

# Optional Catalyst Center connection parameters
catalyst_center_version: str(required=False)
catalyst_center_verify: bool(required=False)
catalyst_center_api_task_timeout: int(min=60, max=3600, required=False)
catalyst_center_debug: bool(required=False)
catalyst_center_log: bool(required=False)
catalyst_center_log_append: bool(required=False)
catalyst_center_log_file_path: str(required=False)
catalyst_center_log_level: str(required=False)
catalyst_center_config_verify: bool(required=False)

---
# Application Policy Config Generator Entry Schema
application_policy_config_generator_type:
  # Output file path for generated YAML
  file_path: str(required=False)

  # File write mode: overwrite or append
  file_mode: enum('overwrite', 'append', required=False)

  # Module config dict - omit to generate all components (full discovery)
  config: include('application_policy_config_type', required=False)

---
# Module config dict schema (mirrors module's config parameter)
application_policy_config_type:
  component_specific_filters: include('application_policy_component_filters_type', required=True)

---
# Application Policy Component Filters Schema
application_policy_component_filters_type:
  components_list: list(enum('queuing_profile', 'application_policy'), min=1, max=2, required=False)
  queuing_profile: list(include('queuing_profile_filter_type'), min=1, max=100, required=False)
  application_policy: list(include('application_policy_filter_type'), min=1, max=100, required=False)

---
# Queuing profile filter schema
queuing_profile_filter_type:
  profile_names_list: list(str(), min=1, max=500, required=False)

---
# Application policy filter schema
application_policy_filter_type:
  policy_names_list: list(str(), min=1, max=500, required=False)
