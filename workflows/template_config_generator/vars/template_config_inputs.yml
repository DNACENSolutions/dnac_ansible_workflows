---
# ============================================================================
# Cisco Catalyst Center Template Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/template_config_generator/playbook/template_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/template_config_generator/vars/template_config_inputs.yml
#
# Module used:
#   cisco.catalystcenter.template_playbook_config_generator
#
# ============================================================================

template_config:
  # 1) Generate all projects and configuration templates (omit config)
  - file_path: "/tmp/template_complete_config.yml"

  # 2) Generate projects only
  - file_path: "/tmp/template_projects_only.yml"
    config:
      component_specific_filters:
        components_list: ["projects"]

  # 3) Generate templates only
  - file_path: "/tmp/template_configuration_templates_only.yml"
    config:
      component_specific_filters:
        components_list: ["configuration_templates"]

  # 4) Filter projects by name
  - file_path: "/tmp/template_project_filter.yml"
    config:
      component_specific_filters:
        components_list: ["projects"]
        projects:
          - name: "Onboarding Configuration"
          - name: "Branch Templates"

  # 5) Filter templates by template_name
  - file_path: "/tmp/template_name_filter.yml"
    config:
      component_specific_filters:
        components_list: ["configuration_templates"]
        configuration_templates:
          - template_name: "PnP-Devices-SW"
          - template_name: "Access_Switch_Base"

  # 6) Filter templates by project_name
  - file_path: "/tmp/template_project_name_filter.yml"
    config:
      component_specific_filters:
        components_list: ["configuration_templates"]
        configuration_templates:
          - project_name: "Onboarding Configuration"

  # 7) Include uncommitted templates
  - file_path: "/tmp/template_with_uncommitted.yml"
    config:
      component_specific_filters:
        components_list: ["configuration_templates"]
        configuration_templates:
          - include_uncommitted: true

  # 8) Combined template filters
  - file_path: "/tmp/template_combined_filters.yml"
    file_mode: "overwrite"
    config:
      component_specific_filters:
        components_list: ["configuration_templates"]
        configuration_templates:
          - project_name: "Onboarding Configuration"
            template_name: "PnP-Devices-SW"
            include_uncommitted: true

# ============================================================================
# Additional examples
# ============================================================================
# Example: Auto-generate filename (no file_path)
# template_config:
#   - {}
#
# Example: Append templates into an aggregate file
# template_config:
#   - file_path: "/tmp/template_aggregate.yml"
#     file_mode: "append"
#     config:
#       component_specific_filters:
#         components_list: ["configuration_templates"]
#         configuration_templates:
#           - project_name: "Campus"

# ============================================================================
# Notes
# ============================================================================
# - If config is omitted, the module runs in full discovery mode.
# - Use config.component_specific_filters for selective generation.
# - Module auto-populates components_list from component filters when omitted.
# ============================================================================
