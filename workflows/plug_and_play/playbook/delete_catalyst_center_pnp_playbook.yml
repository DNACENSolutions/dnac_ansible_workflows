---
- name: Playbook to manage Cisco Catalyst Center Plug and Play, add pnp devices, bulk import, update, claim routing, switching devices and wirelesss controllers. 
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no

  vars:
    state: deleted
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalyst_center_version  | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(catalystcenter_verify) }}"
      config_verify: "{{ catalyst_center_config_verify | default(False) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(False) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(False) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path |  default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append |  default(False) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout |  default(1200) }}"
      
  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that pnp_details is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'pnp_details' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: pnp_details is not defined

    - name: Normalize PnP delete workflow inputs
      ansible.builtin.set_fact:
        pnp_workflow_inputs:
          network_devices: "{{ pnp_details.network_devices | default([]) }}"
          claim_router_devices: "{{ pnp_details.claim_router_devices | default([]) }}"
          claim_switching_devices: "{{ pnp_details.claim_switching_devices | default([]) }}"
          claim_wireless_controllers: "{{ pnp_details.claim_wireless_controllers | default([]) }}"
          claim_access_points: "{{ pnp_details.claim_access_points | default([]) }}"

    - name: Validate that at least one supported PnP delete input bucket is provided
      ansible.builtin.fail:
        msg: >-
          Variable 'pnp_details' does not contain any supported delete input
          buckets. Provide one or more of: network_devices,
          claim_router_devices, claim_switching_devices,
          claim_wireless_controllers, claim_access_points.
      when:
        - pnp_workflow_inputs.network_devices | length == 0
        - pnp_workflow_inputs.claim_router_devices | length == 0
        - pnp_workflow_inputs.claim_switching_devices | length == 0
        - pnp_workflow_inputs.claim_wireless_controllers | length == 0
        - pnp_workflow_inputs.claim_access_points | length == 0

    - name: Network Plug and Play devices on Cisco Catalyst Center
      set_fact:
        long_op_start: "{{ now() }}"

    # Remove pnp devices on Cisco Catalyst Center
    - name: Remove pnp devices to Cisco Catalyst Center
      cisco.catalystcenter.pnp_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config: "{{ pnp_workflow_inputs.network_devices }}"
      register: network_devices_output
      when: pnp_workflow_inputs.network_devices | length > 0
    - name: Print the network devices output
      debug:
        msg: "{{network_devices_output}}"
      when: network_devices_output is defined

    # Remove Routing devices through PnP 
    - name: Remove Routing devices through PnP
      cisco.catalystcenter.pnp_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config: "{{ pnp_workflow_inputs.claim_router_devices }}"
      register: router_devices_output
      when: pnp_workflow_inputs.claim_router_devices | length > 0
    - name: Print the router devices output
      debug:
        msg: "{{router_devices_output}}"
      when: router_devices_output is defined

    # Remove Switching devices through PnP
    - name: Remove Switching devices through PnP
      cisco.catalystcenter.pnp_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config: "{{ pnp_workflow_inputs.claim_switching_devices }}"
      register: switching_devices_output
      when: pnp_workflow_inputs.claim_switching_devices | length > 0
    - name: Print the switching devices output
      debug:
        msg: "{{switching_devices_output}}"
      when: switching_devices_output is defined

    # Remove Wireless Controller EWLC devices through PnP
    - name: Remove Wireless Controller EWLC devices through PnP
      cisco.catalystcenter.pnp_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config: "{{ pnp_workflow_inputs.claim_wireless_controllers }}"
      register: wireless_controllers_output
      when: pnp_workflow_inputs.claim_wireless_controllers | length > 0
    - name: Print the wireless controllers output
      debug:
        msg: "{{wireless_controllers_output}}"
      when: wireless_controllers_output is defined
    # Remove Access Point device through PnP
    - name: Remove Point device through PnP
      cisco.catalystcenter.pnp_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config: "{{ pnp_workflow_inputs.claim_access_points }}"
      register: access_points_output
      when: pnp_workflow_inputs.claim_access_points | length > 0
    - name: Print the access points output
      debug:
        msg: "{{access_points_output}}"
      when: access_points_output is defined

    - name: Network Plug and Play devices playbook end time
      set_fact:
        long_op_end: "{{ now() }}"
    - name: Print Network Plug and Play devices playbook execution time
      debug:
        msg: "Network Plug and Play devices playbook run time: {{ long_op_start }}, end: {{ long_op_end }}"
