# ============================================================================
# Cisco Catalyst Center ISE Radius Integration Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/ise_radius_integration_config_generator/playbook/ise_radius_integration_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/ise_radius_integration_config_generator/vars/ise_radius_integration_config_inputs.yml
#
# Module used:
#   cisco.catalystcenter.ise_radius_integration_playbook_config_generator
# ============================================================================

#============================================================================
# ISE Radius Integration Configuration Generation Examples
#============================================================================

ise_radius_integration_config:
  # 1) Generate all authentication policy server configurations (omit config)
  - file_path: "/tmp/ise_radius_integration_complete_config.yml"

  # 2) Generate authentication policy server component only
  - file_path: "/tmp/ise_radius_component_only.yml"
    config:
      component_specific_filters:
        components_list: ["authentication_policy_server"]

  # 3) Filter by server type (Cisco ISE)
  - file_path: "/tmp/ise_radius_server_type_ise.yml"
    config:
      component_specific_filters:
        components_list: ["authentication_policy_server"]
        authentication_policy_server:
          - server_type: "ISE"

  # 4) Filter by server type and specific IP
  - file_path: "/tmp/ise_radius_server_specific.yml"
    file_mode: "append"
    config:
      component_specific_filters:
        components_list: ["authentication_policy_server"]
        authentication_policy_server:
          - server_type: "AAA"
            server_ip_address: "10.100.10.50"

# ============================================================================
# Notes
# ============================================================================
# - If config is omitted, the module runs in full discovery mode.
# - Use config.component_specific_filters for selective generation.
# - If authentication_policy_server filter is provided without components_list,
#   the module auto-adds authentication_policy_server internally.
# ============================================================================
