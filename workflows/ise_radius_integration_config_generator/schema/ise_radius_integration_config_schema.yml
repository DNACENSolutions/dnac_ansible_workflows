# Cisco Catalyst Center ISE Radius Integration Config Generator Schema
# ======================================================================================
#
# This schema defines the configuration structure for generating YAML playbook
# configurations from existing authentication policy server settings in Cisco
# Catalyst Center using the ise_radius_integration_playbook_config_generator module.

# Schema Definition
ise_radius_integration_config: list(include('ise_radius_integration_config_generator_type'), min=1, max=100, required=True)

# Optional Catalyst Center connection parameters
catalyst_center_version: str(required=False)
catalyst_center_verify: bool(required=False)
catalyst_center_api_task_timeout: int(min=60, max=3600, required=False)
catalyst_center_debug: bool(required=False)
catalyst_center_log: bool(required=False)
catalyst_center_log_append: bool(required=False)
catalyst_center_log_file_path: str(required=False)
catalyst_center_log_level: str(required=False)
catalyst_center_config_verify: bool(required=False)

---
# ISE Radius Integration Config Generator Entry Schema
ise_radius_integration_config_generator_type:
  generate_all_configurations: bool(required=False)
  file_path: str(required=False)
  file_mode: enum('overwrite', 'append', required=False)
  component_specific_filters: include('ise_radius_component_filters_type', required=False)

---
# ISE Radius component filters schema
ise_radius_component_filters_type:
  components_list: list(enum('authentication_policy_server'), min=1, max=1, required=False)
  authentication_policy_server: include('authentication_policy_server_filter_type', required=False)

---
# Authentication policy server filter schema
authentication_policy_server_filter_type:
  server_type: enum('AAA', 'ISE', required=False)
  server_ip_address: str(required=False)
