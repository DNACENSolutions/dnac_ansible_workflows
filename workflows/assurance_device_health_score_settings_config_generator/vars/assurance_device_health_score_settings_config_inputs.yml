# ============================================================================
# Cisco Catalyst Center Assurance Device Health Score Settings Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/assurance_device_health_score_settings_config_generator/playbook/assurance_device_health_score_settings_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/assurance_device_health_score_settings_config_generator/vars/assurance_device_health_score_settings_config_inputs.yml
#
# Module used:
#   cisco.dnac.assurance_device_health_score_settings_playbook_config_generator
# ============================================================================

assurance_device_health_score_settings_config:
  # 1) Generate all device health score settings
  - generate_all_configurations: true
    file_path: "/tmp/assurance_device_health_score_settings_complete_config.yml"

  # 2) Generate device health score settings component only
  - file_path: "/tmp/assurance_device_health_score_settings_component.yml"
    component_specific_filters:
      components_list: ["device_health_score_settings"]

  # 3) Filter by selected device families
  - file_path: "/tmp/assurance_device_health_score_settings_family_filter.yml"
    component_specific_filters:
      components_list: ["device_health_score_settings"]
      device_health_score_settings:
        device_families:
          - "UNIFIED_AP"
          - "ROUTER"
          - "SWITCH_AND_HUB"

  # 4) Append another filtered export
  - file_path: "/tmp/assurance_device_health_score_settings_aggregate.yml"
    file_mode: "append"
    component_specific_filters:
      components_list: ["device_health_score_settings"]
      device_health_score_settings:
        device_families:
          - "WIRELESS_CONTROLLER"
          - "WIRED_CLIENT"

# ============================================================================
# Notes
# ============================================================================
# - If component_specific_filters is omitted, the workflow omits module config
#   and runs in full discovery mode.
# - If device_health_score_settings filter is provided without components_list,
#   the module can auto-add device_health_score_settings internally.
# ============================================================================
