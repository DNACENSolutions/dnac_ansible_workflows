# ============================================================================
# Cisco Catalyst Center Assurance Device Health Score Settings Config Generator
# ============================================================================
#
# Usage:
  # ansible-playbook -i inventory/demo_lab/hosts.yaml \
  #   workflows/assurance_device_health_score_settings_config_generator/playbook/assurance_device_health_score_settings_config_generator.yml \
  #   --extra-vars VARS_FILE_PATH=../vars/assurance_device_health_score_settings_config_inputs.yml
#
# Module used:
#   cisco.catalystcenter.assurance_device_health_score_settings_playbook_config_generator
# ============================================================================

assurance_device_health_score_settings_config:
  # 1) Generate all device health score settings
  - file_path: "assurance_device_health_score/assurance_device_health_score_settings_complete_config.yml"
    file_mode: "overwrite"

  # 2) Generate device health score settings component only
  - file_path: "assurance_device_health_score/assurance_device_health_score_settings_component.yml"
    file_mode: "overwrite"
    config:
      component_specific_filters:
        components_list: ["device_health_score_settings"]

  # 3) Filter by selected device families
  - file_path: "assurance_device_health_score/assurance_device_health_score_settings_family_filter.yml"
    file_mode: "overwrite"
    config:
      component_specific_filters:
        components_list: ["device_health_score_settings"]
        device_health_score_settings:
          - device_families:
              - "UNIFIED_AP"
              - "ROUTER"
              - "SWITCH_AND_HUB"

  # 4) Append another filtered export
  - file_path: "assurance_device_health_score/assurance_device_health_score_settings_aggregate.yml"
    file_mode: "append"
    config:
      component_specific_filters:
        components_list: ["device_health_score_settings"]
        device_health_score_settings:
          - device_families:
              - "WIRELESS_CONTROLLER"
              - "WIRED_CLIENT"

# ============================================================================
# Notes
# ============================================================================
# - Omit `config` to run the module in full discovery mode.
# - When `config` is provided, `component_specific_filters` is mandatory.
# - If `device_health_score_settings` is provided without `components_list`,
#   the module can auto-add `device_health_score_settings` internally.
# ============================================================================
