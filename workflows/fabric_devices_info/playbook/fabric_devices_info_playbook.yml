---
- name: Gather Fabric Device Information from Cisco Catalyst Center
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: false
  vars:
    dnac_login: &dnac_login
      catalystcenter_host: "{{ catalyst_center_host }}"
      catalystcenter_username: "{{ catalyst_center_username }}"
      catalystcenter_password: "{{ catalyst_center_password }}"
      catalystcenter_verify: "{{ catalyst_center_verify }}"
      catalystcenter_port: "{{ catalyst_center_port }}"
      catalystcenter_version: "{{ catalyst_center_version }}"
      catalystcenter_debug: "{{ catalyst_center_debug }}"
      catalystcenter_log: "{{ catalyst_center_log }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"

  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that fabric_device_info_details is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'fabric_device_info_details' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: fabric_device_info_details is not defined

    - name: Gather fabric device information from Cisco Catalyst Center
      cisco.catalystcenter.fabric_devices_info_workflow_manager:
        <<: *dnac_login
        state: gathered
        config: "{{ fabric_device_info_details }}"
      register: result_fabric_device_info

    - name: Display fabric device information gathering status
      debug:
        msg:
          - "Fabric device information gathering status: {{ result_fabric_device_info.status }}"
          - "Number of query sets processed: {{ result_fabric_device_info.response | length }}"

    - name: Display fabric device information results
      debug:
        var: result_fabric_device_info

    - name: Display fabric device information summary
      debug:
        msg:
          - "Fabric Device Info workflow completed"
          - "Total devices queried: {{ result_fabric_device_info.response[0]| regex_findall(\"'([^']+)'\") | length }}"
          - "Total devices found: {{ result_fabric_device_info.response[0] }}"
          - "Status: {{ result_fabric_device_info.status }}"
      when: result_fabric_device_info.status == "success"