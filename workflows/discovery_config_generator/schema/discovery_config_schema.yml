# Cisco Catalyst Center - Discovery Config Generator Schema
# ===================================================================
#
# This schema defines the configuration structure for generating YAML
# configurations from existing discovery tasks in Cisco Catalyst Center using
# the cisco.catalystcenter.discovery_playbook_config_generator module.
#
# SCHEMA OVERVIEW:
# ----------------
# The schema supports configuration generation operations for:
# 1. Generate All        - Extract all discovery task configurations
# 2. Filter by Name      - Extract specific discoveries by exact name
# 3. Filter by Type      - Extract discoveries by type (Single/Range/CDP/LLDP/CIDR)
# 4. Append Mode         - Append generated configs to an existing YAML file
# 5. Overwrite Mode      - Replace existing YAML file with new config (default)
#
# USAGE:
# ------
# This schema validates YAML configuration files for automating the extraction
# and generation of discovery configurations from existing
# Catalyst Center deployments (brownfield scenarios).
#
#
# TOP-LEVEL PARAMETERS:
# ---------------------
# catalyst_center_version:          Catalyst Center version (optional, overrides host file)
# catalyst_center_verify:           SSL certificate verification (optional, default: false)
# catalyst_center_api_task_timeout: API task timeout in seconds (optional, default: 1200)
# catalyst_center_debug:            Enable debug mode (optional, default: false)
# catalyst_center_log:              Enable logging (optional, default: false)
# catalyst_center_log_append:       Append to log file (optional, default: true)
# catalyst_center_log_file_path:    Log file path (optional, default: 'dnac.log')
# catalyst_center_log_level:        Log level (CRITICAL, ERROR, WARNING, INFO, DEBUG)
#
# discovery_config_details 
# DISCOVERY_CONFIG_GENERATOR_DETAILS SECTION:
# -----------------------------------------------------
# Contains configuration for generating YAML configurations from existing infrastructure:
#
# 1. FILE_PATH:
#    - Type: string (optional)
#    - Description: Output path where the YAML configuration file will be saved.
#    - If not provided, auto-generates a timestamped filename in the current directory.
#    - Auto-generated format: discovery_playbook_config_<YYYY-MM-DD_HH-MM-SS>.yml
#    - Example: discovery_playbook_config_2026-01-24_12-33-20.yml
#    - Supports absolute and relative paths.
#    - Creates directory structure if it doesn't exist
#    - This is a module-level parameter (outside config)
#
# 2. FILE_MODE:
#    - Type: string (optional, default: "overwrite")
#    - Description: File write mode for the generated YAML configuration file
#    - Valid values: "overwrite" (replaces existing file), "append" (adds to existing file)
#    - Only applicable when file_path is provided
#    - This is a module-level parameter (outside config)
#
# 3. CONFIG:
#    - Type: dictionary (optional)
#    - Description: Configuration filters for generating YAML configurations compatible with
#      the 'discovery_workflow_manager' module
#    - If omitted or provided as an empty dictionary, the workflow omits module config
#      and all configurations are auto-generated
#
# 4. GLOBAL_FILTERS:
#    - Type: dictionary (required when config is provided)
#    - Description: Global filters to apply when generating the YAML configuration file.
#    - These filters identify which discovery tasks to extract configurations from.
#    - Mandatory when CONFIG is provided.
#    - If config is omitted, module runs in internal auto-discovery mode.
#
#    a. DISCOVERY_NAME_LIST:
#       - Type: list of strings (optional)
#       - Priority: HIGHEST PRIORITY — If provided, discovery_type_list will be ignored.
#       - Description: List of discovery task names to extract configurations from.
#       - Discovery names must match those configured in Catalyst Center.
#       - Case-sensitive and must be exact matches.
#       - Example: ["Multi_global", "Single IP Discovery", "CDP_Test_1"]
#       - Invalid names are silently skipped (no match → no output for that name).
#       - Empty list [] is treated as no filter (all discoveries included).
#       - Only non-empty strings are allowed as discovery names.
#
#    b. DISCOVERY_TYPE_LIST:
#       - Type: list of strings (optional)
#       - Priority: LOWER PRIORITY — Only used if discovery_name_list is not provided.
#       - Description: List of discovery types to filter by.
#       - Valid values: Single, Range, CDP, LLDP, CIDR
#       - Will include all discoveries matching any of the specified types.
#       - Example: ["CDP", "LLDP"]
#       - Empty list [] is treated as no filter (all discoveries included).
#       - Invalid type values will cause module validation failure.
#       - Case-sensitive matching - must use exact values as listed.
#
# GENERATED OUTPUT STRUCTURE:
# ---------------------------
# The generated YAML file will contain a 'config' section with the following structure:
#
# config:
# - discovery_name: LLDP Discovery
#   discovery_type: LLDP
#   ip_address_list:
#   - 204.1.2.1
#   global_credentials:
#     cli_credentials_list:
#     - description: WLC
#       username: wlcaccess
#     http_read_credential_list:
#     - description: http_read
#       username: wlcaccess
#     http_write_credential_list:
#     - description: http_write
#       username: wlcaccess
#     snmp_v2_read_credential_list:
#     - description: snmpRead
#     snmp_v2_write_credential_list:
#     - description: snmpWrite
#     snmp_v3_credential_list:
#     - description: SNMPv3-credentials
#       username: v3Public1
#     net_conf_port_list:
#     - description: defaultNetConfPort
#   discovery_specific_credentials: {}
#   protocol_order: SSH
#   lldp_level: 16
#   preferred_mgmt_ip_method: None
#   discovery_condition: Complete
#   discovery_status: Inactive
#   is_auto_cdp: false
#
# VALIDATION RULES:
# ----------------
# 1. If config is omitted or empty, all configurations are auto-generated
# 2. global_filters is required when config is provided with filter content
# 4. file_path and file_mode can be specified outside of the config
# 5. Idempotency: In overwrite mode, the full file content is compared (excluding volatile
#     fields like timestamps and playbook path). In append mode, only the last YAML document 
#     in the file is compared against the newly generated configuration. If a file contains 
#     multiple config entries from previous appends, only the most recent entry is used for 
#     the idempotency check
#
# OPERATION WORKFLOWS:
# --------------------
# 1. Generate All Discoveries:
#    a. Omit config parameter entirely at module level
#    b. All existing discoveries are extracted regardless of type or name
#
# 2. Filter by Name (Highest Priority):
#    a. Provide global_filters.discovery_name_list
#    b. Only discoveries with exact matching names are extracted
#    c. discovery_type_list is ignored even if also provided
#
# 3. Filter by Type (Lower Priority):
#    a. Provide global_filters.discovery_type_list (without discovery_name_list)
#    b. Only discoveries matching the specified types are extracted
#    c. Valid types: Single, Range, CDP, LLDP, CIDR
#
# 4. Custom Output Path:
#    a. Specify file_path parameter (module-level)
#    b. Can use absolute or relative paths
#    c. Directory structure will be created if needed
#
# 5. Idempotency Behavior:
#    a. Overwrite mode: Compares full file content (ignores timestamps/playbook paths)
#    b. Append mode: Compares only the last YAML document in existing file
#    c. Multiple appends: Only most recent entry is used for comparison
#    d. Prevents duplicate content generation when configuration hasn't changed
#
# 6. Default Behavior:
#    a. If no config specified, all components are generated
#    b. If no file_path specified, auto-generates filename with timestamp
#    c. Generated in current working directory with default overwrite mode

# EXAMPLES:
# ---------
# See the vars/ directory for comprehensive example configuration files demonstrating
# different usage patterns and scenarios.

# =============================================================================
# Schema Definition
# =============================================================================

discovery_config_details: list(include('discovery_config_generator_type'), min=1, required=True)

# Optional Catalyst Center connection override parameters
catalyst_center_version: str(required=False)
catalyst_center_verify: bool(required=False)
catalyst_center_api_task_timeout: int(min=60, max=3600, required=False)
catalyst_center_debug: bool(required=False)
catalyst_center_log: bool(required=False)
catalyst_center_log_append: bool(required=False)
catalyst_center_log_file_path: str(required=False)
catalyst_center_log_level: str(required=False)
catalyst_center_config_verify: bool(required=False)

---
# Discovery Config Generator Entry Schema
# Each list entry is a dict passed directly as the module's config parameter (type: dict)
discovery_config_generator_type:

  # Output file path (optional - module level parameter)
  file_path: str(required=False)

  # File write mode (optional, default: overwrite - module level parameter)
  file_mode: enum('overwrite', 'append', required=False)

  # Config parameter containing global filters (optional - module level parameter)
  config: include('discovery_global_type', required=False)

---
# Config Schema - what goes inside the config parameter
discovery_global_type:
  # Global filters (required when config is provided)
  global_filters: include('discovery_global_filters_type', required=True)


---
# Global Filters Schema
# Identifies which discovery tasks to include in the generated YAML.
# Priority: discovery_name_list (highest) > discovery_type_list (lower)
# These filters are mandatory when config is provided to the module.
discovery_global_filters_type:

  # List of discovery task names to filter by.
  discovery_name_list: list(str(), min=0, max=500, required=False)

  # List of discovery types to filter by.
  discovery_type_list: list(enum('Single', 'Range', 'CDP', 'LLDP', 'CIDR'), min=0, max=5, required=False)
