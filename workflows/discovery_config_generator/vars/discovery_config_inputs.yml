---
# ============================================================================
# Cisco Catalyst Center - Discovery Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/discovery_config_generator/playbook/discovery_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=../vars/discovery_config_inputs.yml
# ============================================================================

discovery_config_details:
  # Generate all configurations (omit config)
  - file_path: "/tmp/complete_discovery_config.yml"

  # Filter by a single discovery name
  - file_path: "/tmp/single_name_discovery.yml"
    config:
      global_filters:
        discovery_name_list:
          - "Range Discovery"

  # Filter by a multiple discovery names
  - file_path: "/tmp/multiple_name_discovery.yml"
    config:
      global_filters:
        discovery_name_list:
          - "Range Discovery"
          - "Single Discovery"

  # Filter by a single discovery type
  - file_path: "/tmp/single_type_discovery.yml"
    config:
      global_filters:
        discovery_type_list:
          - "Single"

  # Filter by a single discovery type
  - file_path: "/tmp/multiple_type_discovery.yml"
    config:
      global_filters:
        discovery_type_list:
          - "LLDP"
          - "Single"
          - "CIDR"

# Filter by discovery name list (HIGHEST PRIORITY)
# Extracts only discoveries with exact matching names.
# discovery_type_list is ignored when names are provided.
  - file_path: "/tmp/specific_discoveries.yml"
    config:
      global_filters:
        discovery_name_list:
          - "Range Discovery"
        discovery_type_list:
          - "Single" # <-- IGNORED because discovery_name_list is provided
       
# Multiple discovery names and discovery types together (name filter takes precedence)
  - file_path: "/tmp/specific_discoveries_multiple_filters.yml"
    config:
      global_filters:
        discovery_name_list:  
          - "Range Discovery"
          - "Single Discovery"
        discovery_type_list:
          - "LLDP" 
          - "CDP"  

# ============================================================================
# GLOBAL_FILTERS Priority Documentation
# ============================================================================
#
# discovery_name_list: HIGHEST PRIORITY
# - Exact case-sensitive match against discovery task names in Catalyst Center
# - When provided, discovery_type_list is completely ignored
# - Invalid/non-existent names produce no output for that name
# - Empty list [] treated as no filter (all discoveries included)
# - Example: ["Range Discovery","Single Discovery"]
#
# discovery_type_list: LOWER PRIORITY
# - Only applied when discovery_name_list is NOT provided
# - Valid values: Single, Range, CDP, LLDP, CIDR (case-insensitive internally)
# - Invalid type values cause module validation failure
# - Empty list [] treated as no filter (all discoveries included)
# - Example: ["CDP", "LLDP"]
#
# ============================================================================
# Notes and Limitations
# ============================================================================
# 1. Network Connectivity: Requires HTTPS connectivity to Catalyst Center
# 2. File Permissions   : Ensure write access to specified file paths
# 3. State Support      : Only 'gathered' state is supported
# 4. Configuration Scope: Only retrieves existing configurations (brownfield)
# 5. Authentication     : Uses Catalyst Center credentials from inventory
# ============================================================================
