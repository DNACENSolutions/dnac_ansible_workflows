---
- name: Configure device credentials on Cisco Catalyst Center Center
  hosts: catalyst_cennter_hosts
  connection: local
  gather_facts: no
  no_log: false
  

  vars:
    STATE: "present"
    dnac_login: &dnac_login
      catalystcenter_host: "{{ catalystcenter_host }}"
      catalystcenter_username: "{{ catalystcenter_username }}"
      catalystcenter_password: "{{ catalystcenter_password }}"
      catalystcenter_verify: "{{ catalystcenter_verify }}"
      catalystcenter_port: "{{ catalystcenter_port }}"
      catalystcenter_version: "{{ catalyst_center_version  | default(catalystcenter_version) }}"
      catalystcenter_debug: "{{ catalystcenter_debug }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout |  default(1200) }}"

  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that global_ippools is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'global_ippools' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: global_ippools is not defined

    - name: print global_ippools
      debug:
        msg: "{{ global_ippools }}"

    - name: Create Global IP Pools from the list provided in file path "{{ VARS_FILE_PATH | default('inventory / host variables') }}"
      cisco.catalystcenter.global_pool:
        <<: *dnac_login
        state: "{{ STATE }}"
        settings:
          ippool: "{{ [item]}}"
      register: global_ippools_result
      loop: "{{ global_ippools.ippool }}"

    - name: Print Global IP Pools Result
      debug:
        msg: "{{ global_ippools_result }}"
    #count the success result and the failure device_details.results | selectattr('success', 'equalto', True) | list | count
    - name: Print Global IP Pools Success Count
      debug:
        msg: "{{ global_ippools_result.results | selectattr('failed', 'equalto', False) | list | count }}"

    - name: Print Global IP Pools Failure Count
      debug:
        msg: "{{ global_ippools_result.results | selectattr('failed', 'equalto', True) | list | count }}"

  