# ============================================================================
# Cisco Catalyst Center Network Profile Switch Config Generator
# ============================================================================
#
# Usage:
  # ansible-playbook -i inventory/demo_lab/hosts.yaml \
  #   workflows/network_profile_switching_config_generator/playbook/network_profile_switching_config_generator.yml \
  #   --extra-vars VARS_FILE_PATH=./workflows/network_profile_switching_config_generator/vars/network_profile_switching_config_inputs.yml
#
# ============================================================================

network_profile_switch_config:
  # Generate all switch profiles with filepath
  - file_path: "network_profile_switch/generate_all_config1.yml"
    file_mode: "overwrite"
  
  # Generate specific switch profiles by name
  - file_path: "network_profile_switch/profile_name_list1.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        profile_name_list:
          - "Test Profile BF2"
          - "Test Profile BF3"

  # Generate switch profiles assigned to specific sites
  - file_path: "network_profile_switch/site_list1.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        site_list:
          - "Global/NP_SWITCHING_AREA/NP_SWITCHING_BLD/FLOOR1"

  # Generate switch profiles by multiple sites
  - file_path: "network_profile_switch/site_list2.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        site_list:
          - "Global/NP_SWITCHING_AREA/NP_SWITCHING_BLD/FLOOR1"
          - "Global/a_swim/swim_test1"

  # Generate switch profiles by Day-N templates
  - file_path: "network_profile_switch/day_n_template_list1.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        day_n_template_list:
          - "NP_Switching_DayN_Template"

  # Generate switch profiles by multiple Day-N templates
  - file_path: "network_profile_switch/day_n_template_list2.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        day_n_template_list:
          - "NP_Switching_DayN_Template"
          - "sunil_regular_template"
  
  # Generate switch profiles for combined Filters (Profile Names + Day-N Templates)
  - file_path: "network_profile_switch/combined_profile_and_template1.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        profile_name_list:
          - "Test Profile BF2"
        day_n_template_list:
          - "sunil_composite_template"

  # Multiple generation tasks in single execution
  - file_path: "network_profile_switch/profile_name_list2.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        profile_name_list:
          - "Test Profile BF3"

  - file_path: "network_profile_switch/day_n_template_list3.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        day_n_template_list:
          - "evpn_l2vn_anycast_template"

  - file_path: "network_profile_switch/site_list3.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        site_list:
          - "Global/a_swim"

# ============================================================================
# Additional Configuration Examples
# ============================================================================
# Example 1: Generate all switch profiles with auto-generated filename
# network_profile_switch_config:
#   - {}

# Example 2: Custom file path with specific profiles
# network_profile_switch_config:
#   - file_path: "/home/ansible/switch_configs/production_campus_profiles.yml"
#     config:
#       global_filters:
#         profile_name_list:
#           - "Production_Campus_Profile"

# Example 3: Site-based filtering for regional deployment
# network_profile_switch_config:
#   - file_path: "/tmp/regional_switch_profiles.yml"
#     config:
#       global_filters:
#         site_list:
#           - "Global/NP_SWITCHING_AREA/NP_SWITCHING_BLD/FLOOR1"
#           - "Global/a_swim/swim_test1"

# Example 4: Template-based filtering for compliance
# network_profile_switch_config:
#   - file_path: "/tmp/compliance_switch_profiles.yml"
#     config:
#       global_filters:
#         day_n_template_list:
#           - "NP_Switching_DayN_Template"
#           - "sunil_regular_template"

# ============================================================================
# CONFIG Parameter Documentation
# ============================================================================
#
# - Omit `config` to retrieve all switch profiles from Catalyst Center
# - When `config` is provided, `global_filters` is mandatory
#
# EXAMPLES:
#
# Example A: Generate ALL configurations
# network_profile_switch_config:
#   - file_path: "/tmp/complete_infrastructure.yml"
#
# Example B: Generate specific profiles only
# network_profile_switch_config:
#   - file_path: "/tmp/campus_only.yml"
#     config:
#       global_filters:
#         profile_name_list: ["Test Profile BF2"]
#
# Example C: Site-based filtering
# network_profile_switch_config:
#   - file_path: "/tmp/filtered_config.yml"
#     config:
#       global_filters:
#         site_list: ["Global/NP_SWITCHING_AREA/NP_SWITCHING_BLD/FLOOR1"]

# ============================================================================
# Global Filter Details
# ============================================================================
#
# FILTERS:
# 1. profile_name_list
# 2. day_n_template_list
# 3. site_list
#
# PROFILE_NAME_LIST Filter:
# - config:
#     global_filters:
#       profile_name_list:
#         - "Test Profile BF2"
#         - "Test Profile BF3"
#   Description: Filter by exact switch profile names
#   Case-sensitive: Must match exact profile names in Catalyst Center
#   Behavior: Module will fail if any specified profile doesn't exist
#   Examples:
#     - "Test Profile BF2"
#     - "Test Profile BF3"
#     - "Switch2"
#
# DAY_N_TEMPLATE_LIST Filter:
# - config:
#     global_filters:
#       day_n_template_list:
#         - "NP_Switching_DayN_Template"
#         - "sunil_regular_template"
#   Description: Filter by Day-N template names associated with switch profiles
#   Case-sensitive: Must match exact template names in Catalyst Center
#   Behavior: Returns all switch profiles containing any of the specified templates
#   Examples:
#     - "NP_Switching_DayN_Template"
#     - "sunil_regular_template"
#     - "evpn_l2vn_anycast_template"
#
# SITE_LIST Filter:
# - config:
#     global_filters:
#       site_list:
#         - "Global/NP_SWITCHING_AREA/NP_SWITCHING_BLD/FLOOR1"
#         - "Global/a_swim/swim_test1"
#   Description: Filter by site hierarchy paths where switch profiles are assigned
#   Case-sensitive: Must match exact site hierarchy paths
#   Behavior: Returns all switch profiles assigned to any of the specified sites
#   Examples:
#     - "Global/NP_SWITCHING_AREA/NP_SWITCHING_BLD/FLOOR1"
#     - "Global/a_swim"
#     - "Global/a_swim/swim_test2"

# ============================================================================
# File Path Behavior
# ============================================================================
#
# If file_path is specified:
# - Uses the exact path provided
# - Creates directory structure if it doesn't exist
# - Overwrites existing files
# - Supports absolute and relative paths
#
# If file_path is NOT specified:
# - Auto-generates filename in current working directory
# - Format: network_profile_switching_playbook_config_<YYYY-MM-DD_HH-MM-SS>.yml
# - Example: network_profile_switching_playbook_config_2025-11-12_21-43-26.yml
# - Ensures unique filenames with timestamp

# ============================================================================
# Notes and Limitations
# ============================================================================

# 1. Network Connectivity: Requires HTTPS connectivity to Catalyst Center
# 2. File Permissions: Ensure write access to specified file paths
# 3. Profile Validation: Profile names must exist in Catalyst Center (case-sensitive)
# 4. Site Hierarchy: Site paths must match exact hierarchy in Catalyst Center
# 5. Template Names: Day-N template names must be exact matches (case-sensitive)
# 6. Configuration Scope: Only retrieves existing switch profile configurations
# 7. Authentication: Uses Catalyst Center credentials from inventory configuration
# 8. API Limits: Large result sets may impact performance
# 9. Output Format: Generated files are compatible with cisco.catalystcenter.playbooks module
# ============================================================================
