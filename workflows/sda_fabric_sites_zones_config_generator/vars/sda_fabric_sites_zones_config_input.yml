---
# ============================================================================
# Cisco Catalyst Center SDA Fabric Sites Zones Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/sda_fabric_sites_zones_config_generator/playbook/sda_fabric_sites_zones_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/sda_fabric_sites_zones_config_generator/vars/sda_fabric_sites_zones_config_input.yml
#
# ============================================================================

sda_fabric_sites_zones_config:
  #Generate all SDA fabric sites and zones configurations (omit config)
  - file_path: "/tmp/complete_sda_fabric_sites_zones_config1.yaml"
 
  # Generate only fabric sites configurations 
  - file_path: "/tmp/fabric_sites_only.yaml"
    config:
      component_specific_filters:
        components_list: ["fabric_sites"]
    
  # #Generate only fabric zones  
  - file_path: "/tmp/fabric_zones_only.yaml"
    config:
      component_specific_filters:
        components_list: ["fabric_zones"] 
    
  # #Fabric Sites with Specific Site Filter:    
  - file_path: "/tmp/sda_fabric_sites_zones_components_config1.yaml"
    config:
      component_specific_filters:
        components_list: ["fabric_sites"]
        fabric_sites: 
          - site_name_hierarchy: "Global/Test_Fabric"

  #Fabric Zones with Specific Zone Filter:   
  - file_path: "/tmp/sda_fabric_sites_zones_components_config2.yaml"
    config:
      component_specific_filters:
        components_list: ["fabric_zones"]
        fabric_zones: 
          - site_name_hierarchy: "Global/Test_Fabric/Bld1"

  #Combined Sites and Zones with Filters   
  - file_path: "/tmp/sda_fabric_sites_zones_components_config3.yaml"
    config:
      component_specific_filters:
        components_list: ["fabric_sites","fabric_zones"]
        fabric_sites: 
          - site_name_hierarchy: "Global/Test_Fabric"
        fabric_zones:
          - site_name_hierarchy: "Global/Test_Fabric/Bld1" 

  # All components with no sub-filters
  - file_path: "/tmp/all_components_no_subfilters_config4.yml"
    config:
      component_specific_filters:
        components_list: ["fabric_sites", "fabric_zones"]

  # Components list with only fabric_sites, but fabric_zones filter provided
  # Expected: Auto-population adds fabric_zones to components_list
  - file_path: "/tmp/auto_population_backup_storage_config12.yml"
    config:
      component_specific_filters:
        components_list: ["fabric_sites"]
        fabric_zones:
          - site_name_hierarchy: "Global/Test_Fabric/Bld1" 

  # No components list specified, only component filters provided
  # Expected: Auto-population infers components_list from provided filters
  - file_path: "/tmp/auto_population_from_filters_config13.yml"
    config:
      component_specific_filters:
        fabric_sites: 
          - site_name_hierarchy: "Global/Test_Fabric"
        fabric_zones:
          - site_name_hierarchy: "Global/Test_Fabric/Bld1"

# ============================================================================
# Additional Configuration Examples
# ============================================================================
# Example 1: Custom file path with specific components
# sda_fabric_sites_zones_playbook_config:
#   - file_path: "/home/ansible/sda_configs/production_fabric_sites.yaml"
#     config:
#       component_specific_filters:
#         components_list: ["fabric_sites"]
#
# Example 2: Multiple sites and zones with specific site_name_hierarchy filters
# sda_fabric_sites_zones_playbook_config:
#   - file_path: "fabric_output3"
#     config:
#       component_specific_filters:
#         components_list: ["fabric_sites","fabric_zones"]
#         fabric_sites: 
#           - site_name_hierarchy: "Global/USA/RTP"
#           - site_name_hierarchy: "Global/USA/SAN JOSE"
#         fabric_zones: 
#           - site_name_hierarchy: "Global/USA/SAN JOSE/SJ_BLD21"
#           - site_name_hierarchy: "Global/USA/SAN JOSE/SJ_BLD20"
# ============================================================================
# Notes and Limitations
# ============================================================================
#
# 1. Network Connectivity: Requires HTTPS connectivity to Catalyst Center
# 2. File Permissions: Ensure write access to specified file paths
# 3. Component Validation: Only "fabric_sites" and "fabric_zones" are valid components
# 4. Configuration Scope: Only retrieves existing configurations (brownfield)
# 5. Authentication Profiles: Included automatically in generated configurations
# 6. Site Hierarchy: Uses full hierarchical site names (e.g., "Global/Site/Zone")
# ============================================================================
