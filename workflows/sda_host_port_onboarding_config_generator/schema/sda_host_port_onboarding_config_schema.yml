# Catalyst Center SDA Host Port Onboarding Config Generator Schema
# ======================================================================================
#
# This schema defines the configuration structure for generating YAML playbook
# configurations from existing SDA host port onboarding infrastructure in Cisco Catalyst Center
# using the sda_host_port_onboarding_playbook_config_generator module.
#
# SCHEMA OVERVIEW:
# ---------------
# The schema supports configuration generation operations for:
# 1. Port Assignments - Extract existing port assignment configurations
# 2. Port Channels - Extract existing port channel configurations
# 3. Wireless SSIDs - Extract existing wireless SSID configurations
# 4. Combined Operations - Generate multiple component configurations
# 5. Filtered Generation - Selective component extraction with filters
# 6. Append Mode - Aggregate multiple exports into a single file
#
# USAGE:
# ------
# This schema validates YAML configuration files for automating the extraction
# and generation of SDA host port onboarding configurations from existing
# Catalyst Center deployments (brownfield scenarios).
#
# TOP-LEVEL PARAMETERS:
# -------------------
# catalyst_center_version:           Catalyst Center version (optional, overrides host file)
# catalyst_center_verify:            SSL certificate verification (optional, default: false)
# catalyst_center_api_task_timeout:  API task timeout in seconds (optional, default: 1200)
# catalyst_center_debug:             Enable debug mode (optional, default: false)
# catalyst_center_log:               Enable logging (optional, default: false)
# catalyst_center_log_append:        Append to log file (optional, default: true)
# catalyst_center_log_file_path:     Log file path (optional, default: 'dnac.log')
# catalyst_center_log_level:         Log level (CRITICAL, ERROR, WARNING, INFO, DEBUG)
# catalyst_center_config_verify:     Configuration verification (optional, default: false)
#
# SDA_HOST_PORT_ONBOARDING_CONFIG SECTION:
# ----------------------------------------
# Contains configuration for generating YAML configurations from existing infrastructure:
#
# 1. GENERATE_ALL_CONFIGURATIONS:
#    - Type: boolean (optional, default: false)
#    - Description: If true, generates configurations for all components regardless of filters
#    - When true, overrides any component_specific_filters settings
#    - Retrieves all port assignments, port channels, and wireless SSIDs from Catalyst Center
#
# 2. FILE_PATH:
#    - Type: string (optional)
#    - Description: Output path where the YAML configuration file will be saved
#    - If not provided, auto-generates filename with timestamp
#    - Format: <module>_playbook_config_<YYYY-MM-DD_HH-MM-SS>.yml
#    - Example: sda_host_port_onboarding_config_generator_2026-04-08_14-30-45.yml
#    - Supports absolute and relative paths
#    - Creates directory structure if it doesn't exist
#
# 3. FILE_MODE:
#    - Type: string (optional, default: overwrite)
#    - Description: File write mode — "overwrite" replaces the file; "append" adds to it
#
# 3. CONFIG:
#    - Type: dictionary (optional)
#    - Description: Optional filter configuration
#    - If omitted, the module retrieves all sda host port onboarding configurations without filtering
#    - If provided, component_specific_filters is mandatory for selective extraction
# 
# 4. COMPONENT_SPECIFIC_FILTERS:
#    - Type: dictionary (inside config)
#    - Description: Component-level filters to specify which settings to include
#
#    Sub-options:
#    - COMPONENTS_LIST:
#      - Type: list of strings (optional)
#      - Description: List of components to include in the YAML configuration file
#      - Valid values: "port_assignments", "port_channels", "wireless_ssids"
#      - If  "port_assignments", "port_channels", "wireless_ssids" sub-filter is provided without components_list,
#        the module can auto-add  "port_assignments", "port_channels", "wireless_ssids" internally
#
#    - PORT_ASSIGNMENTS:
#      - Type: list of dictionaries (optional)
#      - Description: Filter port assignments by fabric site

#      Sub-options:
#         - FABRIC_SITE_NAME_HIERARCHY: 
#           - Type: list of strings (optional)
#           - Description: List of fabric site hierarchy paths to filter port assignments
#         - DEVICE_IPS:
#           - Type: list of strings (optional)
#           - Description: List of device IPs to filter port assignments
#         - SERIAL_NUMBERS:
#           - Type: list of strings (optional)
#           - Description: List of device serial numbers to filter port assignments
#         - HOSTNAMES:
#           - Type: list of strings (optional)
#           - Description: List of device hostnames to filter port assignments
# 
#    - PORT_CHANNELS:
#      - Type: list of dictionaries (optional)
#      - Description: Filter port channels by fabric site
# 
#      Sub-options:
#         - FABRIC_SITE_NAME_HIERARCHY: 
#           - Type: list of strings (optional)
#           - Description: List of fabric site hierarchy paths to filter port channels
#         - DEVICE_IPS:
#           - Type: list of strings (optional)
#           - Description: List of device IPs to filter port channels
#         - SERIAL_NUMBERS:
#           - Type: list of strings (optional)
#           - Description: List of device serial numbers to filter port channels
#         - HOSTNAMES:
#           - Type: list of strings (optional)
#           - Description: List of device hostnames to filter port channels
# 
#    - WIRELESS_SSIDS:
#      - Type: dictionary (optional)
#      - Description: Filter wireless SSIDs by fabric site
# 
#      Sub-options:
#         - FABRIC_SITE_NAME_HIERARCHY: 
#           - Type: list of strings (optional)
#           - Description: List of fabric site hierarchy paths to filter wireless SSIDs
#
# GENERATED OUTPUT STRUCTURE:
# --------------------------
# The generated YAML file will contain a 'config' section with the following structure:
#
# config:
# - ip_address: 204.1.2.8
#   fabric_site_name_hierarchy: Global/California/23
#   port_assignments:
#     - interface_name: FiveGigabitEthernet1/0/22
#       connected_device_type: TRUNKING_DEVICE
#       authentication_template_name: No Authentication
#       interface_description: Port 1
#       native_vlan_id: 100
#       allowed_vlan_ranges: all
# - ip_address: 204.1.2.69
#   fabric_site_name_hierarchy: Global/California/23
#   port_channels: 
#     - interface_names:
#       - GigabitEthernet1/0/3
#       connected_device_type: TRUNK
#       protocol: 'ON'
#       native_vlan_id: 100
#       allowed_vlan_ranges: all
# - fabric_site_name_hierarchy: Global/California/23
#   wireless_ssids:
#   - vlan_name: SGT_Port_test_sub-SGT_Port_test
#     ssid_details:
#     - ssid_name: 
# 
# VALIDATION RULES:
# -----------------
# 1. If component_specific_filters is not provided, all configurations are auto-generated with default behavior.
# 2. If component_specific_filters is provided, components_list is optional — any component
#    sub-filter (port_assignments, port_channels, wireless_ssids) that is present is
#    automatically included in the output even without an explicit components_list entry.
# 3. If component_specific_filters is omitted entirely, all components are extracted
#    from all fabric sites — no filtering is applied.
# 4. file_path and file_mode are item-level parameters independent of the filter config.
# 5. Idempotency: In overwrite mode, the full file content is compared (excluding volatile
#    fields like timestamps and playbook path). In append mode, only the last YAML document
#    in the file is compared against the newly generated configuration. If a file contains
#    multiple config entries from previous appends, only the most recent entry is used for
#    the idempotency check.
# 6. For port_assignments and port_channels filters, all provided filter criteria
#    (fabric_site_name_hierarchy, device_ips, serial_numbers, hostnames) are applied
#    together — a device must match ALL specified criteria (AND logic).
# 7. wireless_ssids does not support device-level filters; only fabric_site_name_hierarchy
#    is valid for wireless SSID extraction.
#
# OPERATION WORKFLOWS:
# --------------------
# 1. Configuration Generation (All Components — default):
#    a. Omit component_specific_filters entirely.
#    b. All port assignments, port channels, and wireless SSIDs are extracted from all
#       fabric sites without any filtering.
#
# 2. Selective Component Extraction (component_specific_filters):
#    a. Provide component_specific_filters with a components_list.
#    b. Only the listed components are included in the generated YAML output.
#    c. Component sub-filters narrow down results within each component type:
#       - port_assignments / port_channels: filter by fabric_site_name_hierarchy,
#         device_ips, serial_numbers, and/or hostnames.
#       - wireless_ssids: filter by fabric_site_name_hierarchy only.
#
# 3. Custom Output Path:
#    a. Specify file_path at the item level.
#    b. Supports absolute and relative paths.
#    c. Directory structure is created automatically if it does not exist.
#    d. If file_path is omitted, a timestamped filename is auto-generated in the
#       current working directory.
#
# 4. Aggregating Multiple Exports (Append Mode):
#    a. Set file_mode: append and reuse the same file_path across multiple list items.
#    b. Each item appends its generated configuration as a new YAML document.
#    c. Idempotency check compares only the last YAML document in the existing file.
#
# 5. Idempotency Behavior:
#    a. Overwrite mode: Compares full file content (ignores timestamps and playbook paths).
#    b. Append mode: Compares only the last YAML document in the existing file.
#    c. Prevents duplicate content when configuration has not changed since last run.
#
# 6. Default Behavior:
#    a. If no component_specific_filters is provided, all components are generated.
#    b. If no file_path, an auto-generated timestamped filename is used.
#    c. Default file_mode is overwrite.
# 
# EXAMPLES:
# --------
# See the vars/ directory for comprehensive example configuration files demonstrating
# different usage patterns and scenarios.

# Schema Definition
sda_host_port_onboarding_config: list(include('sda_host_port_onboarding_config_type'), min=1, max=100, required=True)

# Optional Catalyst Center connection parameters
catalyst_center_version: str(required=False)
catalyst_center_verify: bool(required=False)
catalyst_center_api_task_timeout: int(min=60, max=3600, required=False)
catalyst_center_debug: bool(required=False)
catalyst_center_log: bool(required=False)
catalyst_center_log_append: bool(required=False)
catalyst_center_log_file_path: str(required=False)
catalyst_center_log_level: str(required=False)
catalyst_center_config_verify: bool(required=False)

---
# SDA Host Port Onboarding Configuration Generator Schema
sda_host_port_onboarding_config_type:
  # Generate all configurations flag
  generate_all_configurations: bool(required=False)

  # Output file path
  file_path: str(required=False)

  # File write mode: "overwrite" (default) replaces the file; "append" adds to it.
  file_mode: enum('overwrite', 'append', required=False)

  # Component-specific filters
  component_specific_filters: include('component_specific_filters_type', required=False)

---
# Component Specific Filters Schema
component_specific_filters_type:
  # List of components to include
  components_list: list(enum('port_assignments', 'port_channels', 'wireless_ssids'), min=1, max=10, required=False)

  # Port assignments filters
  port_assignments: include('fabric_site_filter_type', required=False)

  # Port channels filters
  port_channels: include('fabric_site_filter_type', required=False)

  # Wireless SSIDs filters (fabric site filter only)
  wireless_ssids: include('fabric_site_filter_type', required=true)

---
# Device Filter Schema (port_assignments and port_channels)
# Supports filtering by fabric site, device IPs, serial numbers, and hostnames.
# All provided criteria are applied with AND logic.
device_filter_type:
  # Fabric site name hierarchy for filtering
  fabric_site_name_hierarchy: list(str(), min=1, max=100, required=False)
  # Device management IP addresses
  device_ips: list(str(), min=1, max=100, required=False)
  # Device serial numbers
  serial_numbers: list(str(), min=1, max=100, required=False)
  # Device hostnames
  hostnames: list(str(), min=1, max=100, required=False)

---
# Fabric Site Filter Schema (wireless_ssids only)
# wireless_ssids does not support device-level filters.
fabric_site_filter_type:
  # Fabric site name hierarchy for filtering
  fabric_site_name_hierarchy: list(str(), min=1, max=100, required=False)
