---
#the following playbook is used to delete Authentication and Policy Servers  on Cisco Catalyst Center
# The playbook is executed with the following command
# Manage operations on Authentication and Policy Servers.
# API to delete Authentication and Policy Server Access Configuration.
# ansible-playbook -i inventory/hosts.yml workflows/ise_radius_integration/playbook/delete_ise_radius_integration_workflow_playbook.yml --extra-vars "VARS_FILES_PATH=../vars/ise_radius_integration_workflow_input.yml"
- name: Network Compliance on  Cisco Catalyst Center
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no


  vars:
    state: deleted
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalyst_center_version  | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(catalystcenter_verify) }}"
      config_verify: "{{ catalyst_center_config_verify | default(False) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(False) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(False) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path |  default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append |  default(False) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout |  default(1200) }}"
      
  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that ise_radius_integration_details is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'ise_radius_integration_details' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: ise_radius_integration_details is not defined

    - name: Playbook start time for Authentication and Policy Servers deletion on Cisco Catalyst Center
      set_fact:
        long_op_start: "{{ now() }}"
    - name: Authentication and Policy Servers deletion on Cisco Catalyst Center
      cisco.catalystcenter.ise_radius_integration_workflow_manager:
        <<: *catalyst_center_login
        state: deleted
        config: "{{ise_radius_integration_details}}"
      register: ise_radius_integration_output
      #when: ise_radius_integration_details is defined
    - name: Print the Authentication and Policy Servers deletion output
      debug:
        msg: "{{ise_radius_integration_output}}"
    - name: Authentication and Policy Servers deletion playbook end time
      set_fact:
        long_op_end: "{{ now() }}"
    - name: Print Authentication and Policy Servers deletion playbook execution time
      debug:
        msg: "Authentication and Policy Servers deletion playbook run time: {{ long_op_start }}, end: {{ long_op_end }}"
  post_tasks:
    - name: run command module to find python version
      ansible.builtin.command: which python
      register: ansible_play_path
      delegate_to: catalyst_center_hosts
      connection: local
