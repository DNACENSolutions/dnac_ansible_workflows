---
# ============================================================================
# Cisco Catalyst Center Site Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/site_config_generator/playbook/site_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/site_config_generator/vars/site_config_inputs.yml
#
# Module used:
#   cisco.catalystcenter.site_playbook_config_generator
# ============================================================================

site_config:
  # Generate all site hierarchy configurations
  - file_path: "/tmp/site_complete_config.yml"

  # Filter by parent hierarchy
  - file_path: "/tmp/site_parent_hierarchy_filter.yml"
    config:
      component_specific_filters:
        components_list: ["site"]
        site:
          - parent_name_hierarchy: "Global/USA"

  # Filter by parent hierarchy and site types
  - file_path: "/tmp/site_parent_and_type_filter.yml"
    config:
      component_specific_filters:
        components_list: ["site"]
        site:
          - parent_name_hierarchy: ["Global/USA", "Global/India"]
            site_type: ["building", "floor"]

  # Filter by explicit site hierarchy list
  - file_path: "/tmp/site_name_hierarchy_filter.yml"
    config:
      component_specific_filters:
        components_list: ["site"]
        site:
          - site_name_hierarchy:
              - "Global/USA/SAN-FRANCISCO"
              - "Global/USA/New York"

  # 5) Combined site filters 
  - file_path: "/tmp/site_aggregate.yml"
    config:
      component_specific_filters:
        components_list: ["site"]
        site:
          - parent_name_hierarchy: "Global/USA"
            site_type: ["area"]
          - site_name_hierarchy: "Global/India"

# ============================================================================
# Additional examples
# ============================================================================
# Example: Generate only floor sites under one parent hierarchy
# site_config:
#   - file_path: "/tmp/site_floor_only.yml"
#     config:
#       component_specific_filters:
#         components_list: ["site"]
#         site:
#           - parent_name_hierarchy: "Global/USA/San Jose"
#             site_type: ["floor"]
#
# Example: Generate only buildings under one parent hierarchy and one specific site name hierarchy
# site_config:
#   - file_path: "/tmp/site_area_building.yml"
#     config:
#       component_specific_filters:
#          components_list: ["site"]
#          site:
#            - site_name_hierarchy: "Global/USA"
#            - parent_name_hierarchy: "Global/UK"
#              site_type:
#                - "building"

# Example: Generate configurations with site type filter - areas only
# site_config:
#   - file_path: "/tmp/site_type_area.yml"
#     config:
#       component_specific_filters:
#          components_list: ["site"]
#          site:
#            - site_type:
#                - "area"

# ============================================================================
# Notes
# ============================================================================
# - If config is omitted or left empty, the workflow omits module config and
#   runs in full discovery mode.
# - In a single site filter item, avoid combining site_name_hierarchy and
#   parent_name_hierarchy together for unambiguous behavior.
# ============================================================================
