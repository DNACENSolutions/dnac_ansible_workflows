# ============================================================================
# Cisco Catalyst Center Events and Notifications Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/events_and_notifications_config_generator/playbook/events_and_notifications_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/events_and_notifications_config_generator/vars/events_and_notifications_config_inputs.yml
#
# Module used:
#   cisco.dnac.events_and_notifications_playbook_config_generator
# ============================================================================

events_and_notifications_config:
  # --------------------------------------------------------------------------
  # 1) Generate ALL events and notifications configurations (full discovery)
  #    Omit config entirely → module retrieves all 8 component types
  # --------------------------------------------------------------------------
  - file_path: "/tmp/events_and_notifications_complete_config.yml"

  # --------------------------------------------------------------------------
  # 2) Using the config: key (preferred) - filter destination components
  # --------------------------------------------------------------------------
  - file_path: "/tmp/events_notifications_destinations.yml"
    config:
      component_specific_filters:
        components_list:
          - "webhook_destinations"
          - "email_destinations"
          - "syslog_destinations"
        destination_filters:
          destination_names:
            - "my-webhook-1"
            - "ops-email-destination"
          destination_types:
            - "webhook"
            - "email"

  # --------------------------------------------------------------------------
  # 3) Using the config: key - filter event notification subscriptions
  # --------------------------------------------------------------------------
  - file_path: "/tmp/events_notifications_subscriptions.yml"
    config:
      component_specific_filters:
        components_list:
          - "webhook_event_notifications"
          - "email_event_notifications"
        notification_filters:
          subscription_names:
            - "Critical Alerts"
            - "Device Down Alerts"
          notification_types:
            - "webhook"

  # --------------------------------------------------------------------------
  # 4) Using the config: key - ITSM settings with append mode
  # --------------------------------------------------------------------------
  - file_path: "/tmp/events_notifications_itsm.yml"
    file_mode: "append"
    config:
      component_specific_filters:
        components_list: ["itsm_settings"]
        itsm_filters:
          instance_names:
            - "ServiceNow-Prod"
            - "BMC-Remedy"

  # --------------------------------------------------------------------------
  # 5) Using the config: key - combined filters (dest + notifications + itsm)
  # --------------------------------------------------------------------------
  - file_path: "/tmp/events_notifications_combined.yml"
    config:
      component_specific_filters:
        components_list:
          - "webhook_destinations"
          - "email_destinations"
          - "webhook_event_notifications"
          - "email_event_notifications"
          - "itsm_settings"
        destination_filters:
          destination_names:
            - "prod-webhook"
          destination_types:
            - "webhook"
        notification_filters:
          subscription_names:
            - "Critical Alerts"
          notification_types:
            - "webhook"
        itsm_filters:
          instance_names:
            - "ServiceNow-Prod"

  # --------------------------------------------------------------------------
  # 6) Legacy convenience key - component_specific_filters at item level
  #    (equivalent to using config: key; both produce identical module calls)
  # --------------------------------------------------------------------------
  - file_path: "/tmp/events_notifications_legacy.yml"
    component_specific_filters:
      components_list:
        - "syslog_destinations"
        - "snmp_destinations"

# ============================================================================
# Notes
# ============================================================================
# Priority chain for module config parameter:
#   1. item.config (preferred) - pass config dict directly
#   2. item.component_specific_filters (legacy convenience) - auto-wrapped
#   3. neither provided → omit config → module generates all 8 components
# When filter blocks are provided, the module auto-adds corresponding
# components to components_list if not already present.
# ============================================================================
