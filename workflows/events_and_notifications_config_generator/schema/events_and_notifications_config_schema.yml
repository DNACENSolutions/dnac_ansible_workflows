# Cisco Catalyst Center Events and Notifications Config Generator Schema
# ======================================================================================
#
# This schema defines the configuration structure for generating YAML playbook
# configurations from existing events and notifications settings in Cisco
# Catalyst Center using the events_and_notifications_playbook_config_generator module.

# Schema Definition
events_and_notifications_config: list(include('events_and_notifications_config_generator_type'), min=1, max=100, required=True)

# Optional Catalyst Center connection parameters
catalyst_center_version: str(required=False)
catalyst_center_verify: bool(required=False)
catalyst_center_api_task_timeout: int(min=60, max=3600, required=False)
catalyst_center_debug: bool(required=False)
catalyst_center_log: bool(required=False)
catalyst_center_log_append: bool(required=False)
catalyst_center_log_file_path: str(required=False)
catalyst_center_log_level: str(required=False)
catalyst_center_config_verify: bool(required=False)

---
# Events and Notifications Config Generator Entry Schema
events_and_notifications_config_generator_type:
  # Output file path for generated YAML
  file_path: str(required=False)

  # File write mode: overwrite or append
  file_mode: enum('overwrite', 'append', required=False)

  # Module config dict - omit to generate all 8 component types (full discovery)
  config: include('events_and_notifications_config_type', required=False)

---
# Module config dict schema (mirrors module's config parameter)
events_and_notifications_config_type:
  component_specific_filters: include('events_and_notifications_component_filters_type', required=True)

---
# Events and Notifications Component Filters Schema
events_and_notifications_component_filters_type:
  components_list: list(enum('webhook_destinations', 'email_destinations', 'syslog_destinations', 'snmp_destinations', 'itsm_settings', 'webhook_event_notifications', 'email_event_notifications', 'syslog_event_notifications'), min=1, max=8, required=False)
  destination_filters: include('destination_filters_type', required=False)
  notification_filters: include('notification_filters_type', required=False)
  itsm_filters: include('itsm_filters_type', required=False)

---
# Destination filters schema
destination_filters_type:
  destination_names: list(str(), min=1, max=500, required=False)
  destination_types: list(enum('webhook', 'email', 'syslog', 'snmp'), min=1, max=4, required=False)

---
# Notification filters schema
notification_filters_type:
  subscription_names: list(str(), min=1, max=500, required=False)
  notification_types: list(enum('webhook', 'email', 'syslog'), min=1, max=3, required=False)

---
# ITSM filters schema
itsm_filters_type:
  instance_names: list(str(), min=1, max=500, required=False)
