---
- name: Generate Wired Campus Automation Configuration
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no

  vars:
    state: gathered
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalyst_center_version | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(catalystcenter_verify) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(false) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(false) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path | default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append | default(true) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout | default(1200) }}"

  tasks:
    # -------------------------------------------------------------------------
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # -------------------------------------------------------------------------
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that wired_campus_automation_config is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'wired_campus_automation_config' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: wired_campus_automation_config is not defined

    # -------------------------------------------------------------------------
    # Playbook execution
    # -------------------------------------------------------------------------
    - name: Playbook start time for wired campus automation configuration generation
      ansible.builtin.set_fact:
        config_gen_start: "{{ now() }}"

    - name: Generate YAML configuration for wired campus automation
      cisco.catalystcenter.wired_campus_automation_playbook_config_generator:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config_verify: "{{ catalyst_center_config_verify | default(false) }}"
        config: "{{ [item] }}"
      loop: "{{ wired_campus_automation_config }}"
      when:
        - wired_campus_automation_config is defined
        - wired_campus_automation_config | length > 0
      register: config_generation_result

    - name: Display configuration generation results
      ansible.builtin.debug:
        var: config_generation_result
      when: config_generation_result is defined

    - name: Playbook end time
      ansible.builtin.set_fact:
        config_gen_end: "{{ now() }}"

    - name: Print playbook execution time
      ansible.builtin.debug:
        msg: "Wired campus automation configuration generation playbook run time: start: {{ config_gen_start }}, end: {{ config_gen_end }}"
