# Catalyst Center Assurance Issue Config Generator Schema
#
# ======================================================================================
#
# This schema defines the configuration structure for generating YAML playbook
# configurations from existing assurance issues in Cisco Catalyst Center
# using the assurance_issue_playbook_config_generator module.
#
# SCHEMA OVERVIEW:
# ---------------
# The schema supports configuration generation operations for:
# 1. Issue Configurations - Extract existing assurance issues with details
# 2. Filtered Generation - Selective issue extraction with name, description, priority, is_enabled filters
# 3. Multi-criteria Filtering - Combine multiple filter types for precise extraction
# 4. Automated Remediation - Generate configurations for remediation workflows
#
# USAGE:
# ------
# This schema validates YAML configuration files for automating the extraction
# and generation of assurance issue configurations from existing
# Catalyst Center deployments (assurance issue playbook config generator scenarios).
#
# TOP-LEVEL PARAMETERS:
# -------------------
# catalyst_center_version:           Catalyst Center version (optional, overrides host file)
# catalyst_center_verify:            SSL certificate verification (optional, default: false)
# catalyst_center_api_task_timeout:  API task timeout in seconds (optional, default: 1200)
# catalyst_center_debug:             Enable debug mode (optional, default: false)
# catalyst_center_log:               Enable logging (optional, default: false)
# catalyst_center_log_append:        Append to log file (optional, default: true)
# catalyst_center_log_file_path:     Log file path (optional, default: 'dnac.log')
# catalyst_center_log_level:         Log level (CRITICAL, ERROR, WARNING, INFO, DEBUG)
# catalyst_center_config_verify:     Configuration verification (optional, default: false)
#
# assurance_issue_config SECTION:
# --------------------------------------------
# Contains configuration for generating YAML configurations from existing assurance issues:
#
# 1. FILE_PATH:
#    - Type: string (optional)
#    - Description: Output path where the YAML configuration file will be saved
#    - If not provided, auto-generates filename with timestamp
#    - Format: assurance_issue_workflow_manager_playbook_<timestamp>.yml
#    - Example: assurance_issue_workflow_manager_playbook_2026-01-24_12-33-20.yml
#    - Supports absolute and relative paths
#    - Creates directory structure if it doesn't exist
#
# 2. FILE_MODE:
#    - Type: string (optional, default: overwrite)
#    - Description: Determines how generated YAML is written when file_path is provided
#    - Supported values: overwrite, append
#    - overwrite replaces existing file content
#    - append adds new content to the existing file
#
# 3. CONFIG:
#    - Type: dictionary (required when config is provided)
#    - Description: Configuration filters for generating YAML playbook compatible with 
#      the 'assurance_issue_workflow_manager' module
#    - If not provided or omitted, all configurations are auto-generated
#    - If provided as empty dict {}, component_specific_filters is mandatory
#    - Contains component_specific_filters for selective component extraction
#
# 4. COMPONENT_SPECIFIC_FILTERS:
#    - Type: dictionary (optional)
#    - Description: Filters to specify which issues to include in the generated configuration
#    - If omitted entirely, module generates all supported components
#    - This becomes the module's 'config.component_specific_filters' parameter
#    
#    Sub-options:
#    - COMPONENTS_LIST:
#      - Type: list of strings (optional, default: ["assurance_user_defined_issue_settings"])
#      - Description: List of components to include in the YAML configuration file
#      - Valid values:
#        * "assurance_user_defined_issue_settings" - Include issue configurations in the generated configuration
#      - Required when no component-specific filter blocks are provided
#      - Empty list is invalid when no component-specific filter blocks are provided
#      - If component filter blocks are provided, components are automatically added to this list
#
#    - ISSUE:
#      - Type: list of dictionaries (optional)
#      - Description: Filter assurance issue configurations by specific criteria
#      - Sub-options:
#        * name: Issue name or description to filter by (optional)
#        * priority: Issue priority level (P1, P2, P3, P4) (optional)
#        * is_enabled: Issue enabled status (true, false) (optional)
#
# GENERATED OUTPUT STRUCTURE:
# --------------------------
# The generated YAML file will contain a 'config' section with the following structure:
#
# config:
#   - assurance_user_defined_issue_settings:
#     - name: "Interface Down"
#       description: "Interface GigabitEthernet1/0/1 is down"
#       priority: "P1"
#       is_enabled: true
#       is_notification_enabled: false
#       rules:
#       - severity: 0
#         facility: CI
#         mnemonic: SHUTFANGONE
#         pattern: shut *, fan has gone
#         occurrences: 1
#         duration_in_minutes: 1
#
# VALIDATION RULES:
# ----------------
# 1. If config is not provided (None), all configurations are auto-generated with default behavior
# 2. If config is provided as empty dict {}, component_specific_filters is mandatory
# 3. component_specific_filters is required when config is provided
# 4. Auto-population of components_list: If component-specific filters (such as 'assurance_user_defined_issue_settings')
#    are provided without explicitly including them in
#    'components_list', those components will be automatically added to 'components_list'
# 5. If no component filter blocks are provided, components_list is mandatory and must not be empty
# 6. file_path and file_mode can be specified outside of the config
# 7. Idempotency: In overwrite mode, the full file content is compared (excluding volatile
#     fields like timestamps and playbook path). In append mode, only the last YAML document
#     in the file is compared against the newly generated configuration. If a file contains
#     multiple config entries from previous appends, only the most recent entry is used for
#     the idempotency check
#
# OPERATION WORKFLOWS:
# -------------------
# 1. Configuration Generation (All Issues):
#    a. Omit config parameter entirely at module level
#    b. All existing assurance issues will be extracted
#
# 2. Selective Issue Generation:
#    a. Use component_specific_filters with components_list
#    b. Specify required components (currently only ["assurance_user_defined_issue_settings"])
#    c. Only specified components will be extracted
#
# 3. Filtered Component Extraction:
#    a. Use component-specific filters (assurance_user_defined_issue_settings)
#    b. Apply filters like name, priority, is_enabled, description
#    c. Extract only issues matching the specified criteria
#    d. Components are auto-populated in components_list if filter blocks are provided
#
# 4. Custom Output Path:
#    a. Specify file_path parameter
#    b. Can use absolute or relative paths
#    c. Directory structure will be created if needed
#
# 5. Idempotency Behavior:
#    a. Overwrite mode: Compares full file content (ignores timestamps/playbook paths)
#    b. Append mode: Compares only the last YAML document in existing file
#    c. Multiple appends: Only most recent entry is used for comparison
#    d. Prevents duplicate content generation when configuration hasn't changed
#
# 6. Default Behavior:
#    a. If no filters specified, all issues are generated
#    b. If no file_path specified, auto-generates filename
#    c. Generated in current working directory or specified path
#
# EXAMPLES:
# --------
# See the vars/ directory for comprehensive example configuration files demonstrating
# different usage patterns and scenarios.

# Schema Definition
assurance_issue_config: list(include('assurance_issue_config_generator'), min=1, max=100, required=True)

# Optional Catalyst Center connection parameters
catalyst_center_version: str(required=False)
catalyst_center_verify: bool(required=False)
catalyst_center_api_task_timeout: int(min=60, max=3600, required=False)
catalyst_center_debug: bool(required=False)
catalyst_center_log: bool(required=False)
catalyst_center_log_append: bool(required=False)
catalyst_center_log_file_path: str(required=False)
catalyst_center_log_level: str(required=False)

---
# Assurance Issue Configuration Generator Schema
assurance_issue_config_generator:
  # Output file path (optional - module level parameter)
  file_path: str(required=False)

  # File write mode (optional, default: overwrite - module level parameter)
  file_mode: enum('overwrite', 'append', required=False)

  # Config parameter containing component filters (optional - module level parameter)
  config: include('assurance_issue_config_type', required=False)

---
# Assurance Issue Config Wrapper Schema
assurance_issue_config_type:
  component_specific_filters: include('assurance_issue_component_filters', required=True)

---
# Assurance Issue Component Filters Schema
assurance_issue_component_filters:
  # List of components to include
  components_list: list(enum("assurance_user_defined_issue_settings"), min=1, max=10, required=False)
  
  # Issue configuration filters
  assurance_user_defined_issue_settings: list(include('issue_filter'), min=1, max=100, required=False)

---
# Issue Filter Schema
issue_filter:
  # Issue name or description for filtering
  name: str(required=False)
  
  # Issue priority level (P1, P2, P3, P4)
  priority: enum("P1", "P2", "P3", "P4", required=False)
  
  # Issue enabled status (true, false)
  is_enabled: bool(required=False)
  
  # Issue notification enabled status (true, false)
  is_notification_enabled: bool(required=False)
  
  # Site hierarchy path for filtering
  description: str(required=False)
