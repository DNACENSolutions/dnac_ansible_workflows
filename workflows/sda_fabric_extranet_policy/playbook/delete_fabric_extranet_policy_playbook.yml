#sda_extranet_policies_workflow_manager
# Manage extranet policy operations such as delete existing policies.
# API for deletion of an existing extranet policy using the policy name.
#Requirements: cisco.catalystcenter == 2.6.0
#  requirements:
#    - cisco.catalystcenter == 2.6.0
---
- name: Playbook to delete Cisco Catalyst Center extranet policies
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no

  vars_files:
    - "{{ VARS_FILE_PATH }}"

  vars:
    state: deleted
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalyst_center_version  | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(catalystcenter_verify) }}"
      config_verify: "{{ catalyst_center_config_verify | default(False) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(False) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(False) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path |  default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append |  default(False) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout |  default(1200) }}"

  tasks:
  #write tasks for extranet policies creations
    - name: Playbook start time for the delete SDA Extranet Policies playbook
      set_fact:
        long_op_start: "{{ now() }}"
    - name: Delete SDA Extranet Policies for pub sub configs "{{ VARS_FILE_PATH }}" and state "{{ state }}"
      cisco.catalystcenter.sda_extranet_policies_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config: "{{ extranet_policies }}" 
      register: extranet_policies_output
      when: extranet_policies is defined
    - name: Print the SDA Extranet Policies output
      debug:
        msg: "{{extranet_policies_output}}"
    - name: SDA Extranet Policies playbook end time
      set_fact:
        long_op_end: "{{ now() }}"
    - name: Print SDA Extranet Policies playbook execution time
      debug:
        msg: "SDA Extranet Policies playbook run time: {{ long_op_start }}, end: {{ long_op_end }}"
  post_tasks:
    - name: run command module to find python version
      ansible.builtin.command: which python
      register: ansible_play_path
      delegate_to: catalyst_center_hosts
      connection: local

