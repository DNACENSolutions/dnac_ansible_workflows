---
# ============================================================================
# Cisco Catalyst Center SDA Fabric Multicast Config Generator Inputs
# ============================================================================
#
# Usage:
# ansible-playbook -i inventory/demo_lab/hosts.yaml \
#   workflows/sda_fabric_multicast_config_generator/playbook/sda_fabric_multicast_config_generator.yml \
#   --extra-vars VARS_FILE_PATH=./workflows/sda_fabric_multicast_config_generator/vars/sda_fabric_multicast_config_generator_inputs.yml \
#   -vvvv
#
# Notes:
# - state is fixed as gathered inside the playbook.
# - Each item below generates one YAML output file that is compatible with:
#   cisco.catalystcenter.sda_fabric_multicast_workflow_manager
# - generate_all_configurations: true  --> omits config so the module
#   exports all multicast data (full discovery mode).
# - file_mode defaults to "overwrite"; set "append" to add to an existing file.
# ============================================================================

sda_fabric_multicast_config:
  # 1) Generate all SDA fabric multicast configurations
  - generate_all_configurations: true
    file_path: "{{ playbook_dir }}/sda_fabric_multicast_playbook_config_all.yml"

  # 2) Generate multicast configurations for one fabric site
  - file_path: "{{ playbook_dir }}/sda_fabric_multicast_playbook_config_sanjose.yml"
    component_specific_filters:
      components_list:
        - fabric_multicast
      fabric_multicast:
        - fabric_name: "Global/USA/SAN JOSE"

  # 3) Generate multicast configuration for one fabric + one L3 VN
  - file_path: "{{ playbook_dir }}/sda_fabric_multicast_playbook_config_sanjose_vn1.yml"
    component_specific_filters:
      components_list:
        - fabric_multicast
      fabric_multicast:
        - fabric_name: "Global/USA/SAN JOSE"
          layer3_virtual_network: "VN1"

  # 4) Generate all configurations for a specific L3 VN across fabric sites
  - file_path: "{{ playbook_dir }}/sda_fabric_multicast_playbook_config_fabric_vn.yml"
    component_specific_filters:
      components_list:
        - fabric_multicast
      fabric_multicast:
        - layer3_virtual_network: "Fabric_VN"

  # 5) Append multicast config for London DC to an existing file
  - file_path: "{{ playbook_dir }}/sda_fabric_multicast_playbook_config_all.yml"
    file_mode: append
    component_specific_filters:
      components_list:
        - fabric_multicast
      fabric_multicast:
        - fabric_name: "Global/Europe/London/DataCenter1"

  # 6) Generate with default auto-generated filename (no file_path)
  - generate_all_configurations: true
