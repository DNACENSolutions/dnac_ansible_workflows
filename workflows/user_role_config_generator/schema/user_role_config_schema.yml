# Cisco Catalyst Center User Role Config Generator Schema
# ======================================================================================
#
# This schema defines the configuration structure for generating YAML playbook
# configurations from existing users and custom roles in Cisco Catalyst Center
# using the user_role_playbook_config_generator module.
#
# Supported components:
# - user_details
# - role_details

# Schema Definition
user_role_config: list(include('user_role_config_generator_type'), min=1, max=100, required=True)

# Optional Catalyst Center connection parameters
catalyst_center_version: str(required=False)
catalyst_center_verify: bool(required=False)
catalyst_center_api_task_timeout: int(min=60, max=3600, required=False)
catalyst_center_debug: bool(required=False)
catalyst_center_log: bool(required=False)
catalyst_center_log_append: bool(required=False)
catalyst_center_log_file_path: str(required=False)
catalyst_center_log_level: str(required=False)
catalyst_center_config_verify: bool(required=False)

---
# User Role Config Generator Entry Schema
user_role_config_generator_type:
  # Workflow-level convenience flag. If true, module config is omitted.
  generate_all_configurations: bool(required=False)

  # Output file path for generated YAML
  file_path: str(required=False)

  # File write mode: overwrite or append
  file_mode: enum('overwrite', 'append', required=False)

  # Standard module-shaped config wrapper.
  config: include('user_role_config_type', required=False)

  # Component-specific filters accepted by user_role_playbook_config_generator
  # as a workflow-level convenience input.
  component_specific_filters: include('user_role_component_filters_type', required=False)

---
# Standard config wrapper schema
user_role_config_type:
  component_specific_filters: include('user_role_component_filters_type', required=True)

---
# User Role Component Filters Schema
user_role_component_filters_type:
  components_list: list(enum('user_details', 'role_details'), min=1, max=2, required=False)

  user_details: list(include('user_details_filter_type'), min=1, max=500, required=False)
  role_details: list(include('role_details_filter_type'), min=1, max=500, required=False)

---
# User details filter schema
user_details_filter_type:
  username: list(str(), min=1, max=500, required=False)
  email: list(str(), min=1, max=500, required=False)
  role_name: list(str(), min=1, max=500, required=False)

---
# Role details filter schema
role_details_filter_type:
  role_name: list(str(), min=1, max=500, required=False)
