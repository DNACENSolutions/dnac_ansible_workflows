# ============================================================================
# Cisco Catalyst Center Access Point Location Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/accesspoint_location_config_generator/playbook/accesspoint_location_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=../vars/accesspoint_location_config_inputs.yml
#
# Module used:
#   cisco.catalystcenter.accesspoint_location_playbook_config_generator
# ============================================================================

accesspoint_location_config:
  - file_path: "/tmp/accesspoint_location_complete_config.yml"

  # # Filter by floor site hierarchy list (highest priority)
  - file_path: "/tmp/accesspoint_location_by_site.yml"
    config:
      global_filters:
        site_list:
          - "Global/USA/SAN JOSE/SJ_BLD22/FLOOR4"
        
  # # Filter by planned access point names
  - file_path: "/tmp/accesspoint_location_by_planned_ap.yml"
    config:
      global_filters:
        planned_accesspoint_list:
          - "Planned_AP1"
     
  # Filter by real access point names
  - file_path: "/tmp/accesspoint_location_by_real_ap.yml"
    config:
      global_filters:
        real_accesspoint_list:
          - "Test_ap"

  # Filter by AP model and append output
  - file_path: "/tmp/accesspoint_location_by_model.yml"
    config:
      global_filters:
        accesspoint_model_list:
          - AP9166I

  # Filter by mac address
  - file_path: "/tmp/accesspoint_location_by_mac.yml"
    config:
      global_filters:
        mac_address_list:
          - "2c:e3:8e:af:d2:e0"

  # Filter by multiple criteria
  - file_path: "/tmp/accesspoint_location_by_multiple_criteria.yml"
    config:
      global_filters:
        planned_accesspoint_list:
          - Planned_AP1
        accesspoint_model_list:
          - AP9166I
        real_accesspoint_list:
          - AP687D.B402.1614
        site_list:
          - Global/USA/New York/NY_BLD1/FLOOR1
        mac_address_list:
          - "68:7d:b4:06:b0:a0"

  # Retrieves all planned access points.
  - file_path: "/tmp/accesspoint_location_by_all_pap.yml"
    config:
      global_filters:
        planned_accesspoint_list:
          - all

  # Retrieves all real access points.
  - file_path: "/tmp/accesspoint_location_by_all_real.yml"
    config:
      global_filters:
        real_accesspoint_list:
          - all

  # Retrieves all floor locations.
  - file_path: "/tmp/accesspoint_location_by_all_site.yml"
    config:
      global_filters:
        site_list:
          - all
          
# ============================================================================
# Notes
# ============================================================================
# - If global_filters is omitted, the workflow omits module config and runs
#   in full discovery mode.
# - Filter priority in module is: site_list > planned_accesspoint_list >
#   real_accesspoint_list > accesspoint_model_list > mac_address_list.
# - Only the highest-priority filter with valid data is applied by the module.
# ============================================================================
