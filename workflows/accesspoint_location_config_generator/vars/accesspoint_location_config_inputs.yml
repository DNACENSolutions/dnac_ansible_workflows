# ============================================================================
# Cisco Catalyst Center Access Point Location Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/accesspoint_location_config_generator/playbook/accesspoint_location_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/accesspoint_location_config_generator/vars/accesspoint_location_config_inputs.yml
#
# Module used:
#   cisco.dnac.accesspoint_location_playbook_config_generator
# ============================================================================

accesspoint_location_config:
  # 1) Generate all access point locations
  - generate_all_configurations: true
    file_path: "/tmp/accesspoint_location_complete_config.yml"

  # 2) Filter by floor site hierarchy list (highest priority)
  - file_path: "/tmp/accesspoint_location_by_site.yml"
    global_filters:
      site_list:
        - "Global/USA/SAN JOSE/SJ_BLD20/FLOOR1"
        - "Global/USA/SAN JOSE/SJ_BLD20/FLOOR2"

  # 3) Filter by planned access point names
  - file_path: "/tmp/accesspoint_location_by_planned_ap.yml"
    global_filters:
      planned_accesspoint_list:
        - "test_ap_location"
        - "test_ap2_location"

  # 4) Filter by real access point names
  - file_path: "/tmp/accesspoint_location_by_real_ap.yml"
    global_filters:
      real_accesspoint_list:
        - "Test_ap"
        - "AP687D.B402.1614-AP-Test6"

  # 5) Filter by AP model and append output
  - file_path: "/tmp/accesspoint_location_aggregate.yml"
    file_mode: "append"
    global_filters:
      accesspoint_model_list:
        - "AP9120E"
        - "AP9130E"

# ============================================================================
# Notes
# ============================================================================
# - If global_filters is omitted, the workflow omits module config and runs
#   in full discovery mode.
# - Filter priority in module is: site_list > planned_accesspoint_list >
#   real_accesspoint_list > accesspoint_model_list > mac_address_list.
# - Only the highest-priority filter with valid data is applied by the module.
# ============================================================================
