# Cisco Catalyst Center Access Point Location Config Generator Schema
# ======================================================================================
#
# This schema defines the configuration structure for generating YAML playbook
# configurations from existing access point location data in Cisco Catalyst Center
# using the accesspoint_location_playbook_config_generator module.

# Schema Definition
accesspoint_location_config: list(include('accesspoint_location_config_generator_type'), min=1, max=100, required=True)

# Optional Catalyst Center connection parameters
catalyst_center_version: str(required=False)
catalyst_center_verify: bool(required=False)
catalyst_center_api_task_timeout: int(min=60, max=3600, required=False)
catalyst_center_debug: bool(required=False)
catalyst_center_log: bool(required=False)
catalyst_center_log_append: bool(required=False)
catalyst_center_log_file_path: str(required=False)
catalyst_center_log_level: str(required=False)
catalyst_center_config_verify: bool(required=False)

---
# Access Point Location Config Generator Entry Schema
accesspoint_location_config_generator_type:
  generate_all_configurations: bool(required=False)
  file_path: str(required=False)
  file_mode: enum('overwrite', 'append', required=False)
  global_filters: include('accesspoint_location_global_filters_type', required=False)

---
# Access Point Location Global Filters Schema
accesspoint_location_global_filters_type:
  site_list: list(str(), min=1, max=500, required=False)
  planned_accesspoint_list: list(str(), min=1, max=500, required=False)
  real_accesspoint_list: list(str(), min=1, max=500, required=False)
  accesspoint_model_list: list(str(), min=1, max=500, required=False)
  mac_address_list: list(str(), min=1, max=500, required=False)
