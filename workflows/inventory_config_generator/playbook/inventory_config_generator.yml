---
- name: Generate Inventory Configuration
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no

  vars:
    state: gathered
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalyst_center_version | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(catalystcenter_verify) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(false) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(false) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path | default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append | default(True) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout | default(1200) }}"

  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that inventory_config is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'inventory_config' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: inventory_config is not defined

    - name: Validate that file_path is provided for each inventory_config entry
      ansible.builtin.assert:
        that:
          - item.file_path is defined
          - item.file_path | string | length > 0
        fail_msg: >-
          Each inventory_config list entry must include a non-empty file_path for output validation.
      loop: "{{ inventory_config }}"
      when:
        - inventory_config is defined
        - inventory_config | length > 0

    # =========================================================================
    # Playbook execution
    # =========================================================================
    - name: Playbook start time for inventory configuration generation
      ansible.builtin.set_fact:
        config_gen_start: "{{ now() }}"

    - name: Generate YAML configuration for inventory
      cisco.catalystcenter.inventory_playbook_config_generator:
        <<: *catalyst_center_login
        state: "{{ state }}"
        file_path: "{{ item.file_path | default(omit) }}"
        file_mode: "{{ item.file_mode | default('overwrite') }}"
        config: "{{ item.config | default(omit) }}"
      loop: "{{ inventory_config }}"
      when:
        - inventory_config is defined
        - inventory_config | length > 0
      register: config_generation_result

    - name: Display configuration generation results
      ansible.builtin.debug:
        var: config_generation_result
      when: config_generation_result is defined

    - name: Check generated inventory files exist and are non-empty
      ansible.builtin.stat:
        path: "{{ item.file_path }}"
      loop: "{{ inventory_config }}"
      register: inventory_output_file_stats
      when:
        - inventory_config is defined
        - inventory_config | length > 0

    - name: Validate generated inventory files exist and are non-empty
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isreg
          - item.stat.size > 0
        fail_msg: >-
          Generated inventory output file check failed for {{ item.item.file_path }}.
          File must exist and contain data.
      loop: "{{ inventory_output_file_stats.results | default([]) }}"

    - name: Validate generated inventory files contain expected config structure
      ansible.builtin.assert:
        that:
          - parsed_output is mapping
          - "'config' in parsed_output"
          - parsed_output.config is sequence
        fail_msg: >-
          Generated inventory output file {{ item.item.file_path }} does not contain expected YAML structure with top-level 'config' list.
      vars:
        parsed_output: "{{ lookup('ansible.builtin.file', item.item.file_path) | from_yaml }}"
      loop: "{{ inventory_output_file_stats.results | default([]) }}"

    # =========================================================================
    # Playbook Execution Summary
    # =========================================================================
    - name: Playbook end time
      ansible.builtin.set_fact:
        config_gen_end: "{{ now() }}"

    - name: Print playbook execution time
      ansible.builtin.debug:
        msg: "Inventory configuration generation playbook run time: start: {{ config_gen_start }}, end: {{ config_gen_end }}"
