# ============================================================================
# Cisco Catalyst Center - Inventory Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/inventory_config_generator/playbook/inventory_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=../vars/inventory_config_inputs.yml
# ============================================================================

inventory_config:
  # --------------------------------------------------------------------------
  # Use Case 1: Generate ALL inventory configurations
  # Description: Workflow omits module config and exports all inventory data.
  # --------------------------------------------------------------------------
  - file_path: "/tmp/inventory_complete_config.yml"

  # --------------------------------------------------------------------------
  # Use Case 2: Filter by devices values (IP/hostname/serial/mac)
  # --------------------------------------------------------------------------
  - file_path: "/tmp/inventory_devices_filter.yml"
    config:
      global_filters: 
        devices:
          - 204.1.216.3

  # --------------------------------------------------------------------------
  # Use Case 3: Filter by device roles
  # --------------------------------------------------------------------------
  - file_path: "/tmp/inventory_roles.yml"
    config:
      global_filters:
        device_roles: 
          - "DISTRIBUTION"
          - "BORDER ROUTER"

  # --------------------------------------------------------------------------
  # Use Case 4: Filter by device roles and device identifier
  # --------------------------------------------------------------------------
  - file_path: "/tmp/inventory_roles_identifier.yml"
    config:
      global_filters:
        device_roles: ["ACCESS", "CORE"]
        device_identifier: "serial_number"

  # --------------------------------------------------------------------------
  # Use Case 5: Use hostname as output identifier key
  # Description: Generated payload uses hostname_list in output config.
  # --------------------------------------------------------------------------
  - file_path: "/tmp/inventory_hostname_identifier.yml"
    config:
      global_filters:
        device_roles:
          - "BORDER ROUTER"
        device_identifier: "hostname"

  # --------------------------------------------------------------------------
  # Use Case 6: Filter by all global filters together (devices, roles,) with mac add as identifier
  # --------------------------------------------------------------------------
  - file_path: "/tmp/inventory_all_filters.yml"
    config:
      global_filters:
        devices:
          - "68:7d:b4:06:b0:a0"
        device_roles:
          - "ACCESS"
        device_identifier: "mac_address"

