---
- name: Playbook to manage Cisco Catalyst Center Device Inventory
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no

  vars:
    state: merged
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalyst_center_version  | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(catalystcenter_verify) }}"
      config_verify: "{{ catalyst_center_config_verify | default(False) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(False) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(False) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path |  default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append |  default(False) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout |  default(1200) }}"
      
  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that inventory_details is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'inventory_details' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: inventory_details is not defined

    - name: Playbook start time for the inventory playbook
      set_fact:
        long_op_start: "{{ now() }}"
    - name: Initialize payload containers
      set_fact:
        inventory_devices_payload: []
        maintenance_payload: []
    - name: Separate maintenance schedules from standard inventory actions
      set_fact:
        inventory_devices_payload: "{{ inventory_devices_payload + ([sanitized_entry] if (sanitized_entry | length) > 0 else []) }}"
        maintenance_payload: "{{ maintenance_payload + ([{'devices_maintenance_schedule': item.devices_maintenance_schedule}] if (item.devices_maintenance_schedule is defined and (item.devices_maintenance_schedule | length) > 0) else []) }}"
      vars:
        sanitized_entry: "{{ item | dict2items | rejectattr('key', 'equalto', 'devices_maintenance_schedule') | list | items2dict }}"
      loop: "{{ (inventory_details.network_devices if (inventory_details is defined and inventory_details.network_devices is defined) else []) }}"
      loop_control:
        label: "{{ item.ip_address_list | default(item.hostname_list | default(item.serial_number_list | default(item.mac_address_list | default('maintenance-only')))) }}"
    - name: Add/Update/assig to site/Provision in file "{{ VARS_FILE_PATH | default('inventory / host variables') }}" and state "{{ state }}"
      cisco.catalystcenter.inventory_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ state }}"
        config: "{{ inventory_devices_payload }}" 
      register: inventory_output
      when:
        - inventory_devices_payload is defined
        - inventory_devices_payload | length > 0
    - name: Print the Inventory devices output
      debug:
        msg: "{{ inventory_output }}"
      when: inventory_output is defined
    - name: Schedule maintenance windows defined in file "{{ VARS_FILE_PATH | default('inventory / host variables') }}"
      cisco.catalystcenter.inventory_workflow_manager:
        <<: *catalyst_center_login
        state: "{{ maintenance_state | default(state) }}"
        config: "{{ maintenance_payload }}"
      register: maintenance_output
      when:
        - maintenance_payload is defined
        - maintenance_payload | length > 0
    - name: Print maintenance schedule output
      debug:
        msg: "{{ maintenance_output }}"
      when: maintenance_output is defined
    - name: Playbook end time for the inventory playbook
      set_fact:
        long_op_end: "{{ now() }}"
    - name: Print Inventory devices playbook execution time
      debug:
        msg: "Inventory devices playbook run time: {{ long_op_start }}, end: {{ long_op_end }}"
  post_tasks:
    - name: run command module to find python version
      ansible.builtin.command: which python
      register: ansible_play_path
      delegate_to: localhost
      run_once: true
  

