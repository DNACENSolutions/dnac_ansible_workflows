---
- name: This playbook manages uploading of devices software images, golden tags and image distribution and activation on the devices
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no


  vars:
    # Define the default values for the DNAC login in inventory file under host. Refer the host.yml file for more details
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalyst_center_version  | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(catalystcenter_verify) }}"
      config_verify: "{{ catalyst_center_config_verify | default(False) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(False) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(False) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path |  default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append |  default(False) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout |  default(1200) }}"
      
  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that swim_details is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'swim_details' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: swim_details is not defined

    #Import an image from a URL
    - name: Import an image from an URL or from Local disc provided in import_images in file {{ VARS_FILE_PATH | default('inventory / host variables') }}
      cisco.catalystcenter.swim_workflow_manager:
        <<: *catalyst_center_login
        config:
        - "{{ item }}"
      loop: "{{ swim_details.import_images }}"
      when: swim_details.import_images is defined

    #Golden tag images on Catalyst Center sites
    - name: Golden tag images on Catalyst Center sites input provided in golden_tag_images in file {{ VARS_FILE_PATH | default('inventory / host variables') }}
      cisco.catalystcenter.swim_workflow_manager:
        <<: *catalyst_center_login
        config:
        - "{{ item }}"
      loop: "{{ swim_details.golden_tag_images }}"
      when: swim_details.golden_tag_images is defined

    #Distribution of images on Catalyst Center sites
    - name: Distribution of images on Catalyst Center sites input provided in distribute_images in file {{ VARS_FILE_PATH | default('inventory / host variables') }}
      cisco.catalystcenter.swim_workflow_manager:
        <<: *catalyst_center_login
        config:
        - "{{ item }}"
      loop: "{{ swim_details.distribute_images }}"
      when: swim_details.distribute_images is defined

    #Activate an image on Catalyst Center sites
    - name: Activate an image on Catalyst Center sites input provided in activate_images in file {{ VARS_FILE_PATH | default('inventory / host variables') }}
      cisco.catalystcenter.swim_workflow_manager:
        <<: *catalyst_center_login
        config:
        - "{{ item }}"
      loop: "{{ swim_details.activate_images }}"
      when: swim_details.activate_images is defined

    #SWIM Full workflow Import an image from a URL, tag it as golden and load it on device
    - name: Import an image from a URL, tag it as golden and load it on device for details provided in {{ VARS_FILE_PATH | default('inventory / host variables') }}
      cisco.catalystcenter.swim_workflow_manager:
        <<: *catalyst_center_login
        config:
        - "{{ item }}"
      loop: "{{ swim_details.upload_tag_dis_activate_images }}"
      when: swim_details.upload_tag_dis_activate_images is defined

