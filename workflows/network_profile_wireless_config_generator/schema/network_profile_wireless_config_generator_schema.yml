# Catalyst Center Network Profile Wireless Config Generator Schema
# ===================================================================================
#
# This schema defines the configuration structure for generating YAML playbook
# configurations from existing wireless profile infrastructure in Cisco Catalyst Center
# using the network_profile_wireless_playbook_config_generator module.
#
# SCHEMA OVERVIEW:
# ---------------
# The schema supports configuration generation operations for:
# 1. Wireless Profile Configurations - Extract existing wireless profile configurations
# 2. Day-N Template Filtering - Filter profiles by template assignments
# 3. Site-based Filtering - Filter profiles by site hierarchy assignments
# 4. SSID Filtering - Filter profiles by SSID usage
# 5. AP Zone Filtering - Filter profiles by AP zone assignments
# 6. Feature Template Filtering - Filter profiles by feature template associations
# 7. Additional Interface Filtering - Filter profiles by additional interface mappings
#
# USAGE:
# ------
# This schema validates YAML configuration files used to automate extraction
# and generation of wireless profile configurations from Catalyst Center
# deployments (brownfield scenarios).
#
# TOP-LEVEL PARAMETERS:
# -------------------
# catalyst_center_version:           Catalyst Center version (optional, overrides host file)
# catalyst_center_verify:            SSL certificate verification (optional, default: false)
# catalyst_center_api_task_timeout:  API task timeout in seconds (optional, default: 1200)
# catalyst_center_debug:             Enable debug mode (optional, default: false)
# catalyst_center_log:               Enable logging (optional, default: false)
# catalyst_center_log_append:        Append to log file (optional, default: true)
# catalyst_center_log_file_path:     Log file path (optional, default: 'dnac.log')
# catalyst_center_log_level:         Log level (CRITICAL, ERROR, WARNING, INFO, DEBUG)
# catalyst_center_config_verify:     Configuration verification (optional, default: false)
#
# network_profile_wireless_config SECTION:
# ------------------------------------------------
# Contains configuration items for generating YAML configurations.
#
# 1. FILE_PATH:
#    - Type: string (optional)
#    - Description: Output path where the YAML configuration file will be saved
#    - If omitted, module auto-generates filename with timestamp
#    - Format: network_profile_wireless_playbook_config_<YYYY-MM-DD_HH-MM-SS>.yml
#
# 2. FILE_MODE:
#    - Type: string (optional, default: overwrite)
#    - Supported values: overwrite, append
#
# 3. CONFIG:
#    - Type: dictionary (optional)
#    - Omit config or leave it empty to retrieve all wireless profiles
#    - If provided, global_filters is mandatory
#
# 4. GLOBAL_FILTERS:
#    - Type: dictionary (inside config)
#    - Filter priority hierarchy (highest to lowest):
#      profile_name_list > day_n_template_list > site_list > ssid_list >
#      ap_zone_list > feature_template_list > additional_interface_list
#    - Only one filter type is effectively processed per item:
#      the highest-priority filter with valid data
#
#    Sub-options:
#    - PROFILE_NAME_LIST:
#      - Type: list of strings (optional)
#      - Priority: 1st
#      - Case-sensitive exact profile name matches
#
#    - DAY_N_TEMPLATE_LIST:
#      - Type: list of strings (optional)
#      - Priority: 2nd
#      - Case-sensitive exact template name matches
#
#    - SITE_LIST:
#      - Type: list of strings (optional)
#      - Priority: 3rd
#      - Case-sensitive exact site hierarchy matches
#
#    - SSID_LIST:
#      - Type: list of strings (optional)
#      - Priority: 4th
#      - Case-sensitive exact SSID matches
#
#    - AP_ZONE_LIST:
#      - Type: list of strings (optional)
#      - Priority: 5th
#      - Case-sensitive exact AP zone name matches
#
#    - FEATURE_TEMPLATE_LIST:
#      - Type: list of strings (optional)
#      - Priority: 6th
#      - Case-sensitive exact feature template name matches
#
#    - ADDITIONAL_INTERFACE_LIST:
#      - Type: list of strings (optional)
#      - Priority: 7th
#      - Case-sensitive exact additional interface name matches
#
# EXAMPLES:
# --------
# See vars/network_profile_wireless_config_generator_inputs.yml for validated examples.

# Schema Definition
network_profile_wireless_config: list(include('network_profile_wireless_config_type'), min=1, max=100, required=True)

# Optional Catalyst Center connection parameters
catalyst_center_version: str(required=False)
catalyst_center_verify: bool(required=False)
catalyst_center_api_task_timeout: int(min=60, max=3600, required=False)
catalyst_center_debug: bool(required=False)
catalyst_center_log: bool(required=False)
catalyst_center_log_append: bool(required=False)
catalyst_center_log_file_path: str(required=False)
catalyst_center_log_level: str(required=False)
catalyst_center_config_verify: bool(required=False)

---
# Network Profile Wireless Configuration Generator Schema
network_profile_wireless_config_type:
  # Output file path
  file_path: str(required=False)

  # File write mode: "overwrite" (default) replaces the file; "append" adds to it.
  file_mode: enum('overwrite', 'append', required=False)

  # Optional config block. Omit or leave empty to gather all wireless profiles.
  config: include('network_profile_wireless_config_wrapper_type', required=False)

---
# Wrapper for config block
network_profile_wireless_config_wrapper_type:
  global_filters: include('network_profile_wireless_global_filters_type', required=True)

---
# Network Profile Wireless Global Filters Schema
network_profile_wireless_global_filters_type:
  # Profile name list - Priority 1 (HIGHEST)
  profile_name_list: list(str(), min=1, max=100, required=False)

  # Day-N template list - Priority 2
  day_n_template_list: list(str(), min=1, max=100, required=False)

  # Site list - Priority 3
  site_list: list(str(), min=1, max=100, required=False)

  # SSID list - Priority 4
  ssid_list: list(str(), min=1, max=100, required=False)

  # AP zone list - Priority 5
  ap_zone_list: list(str(), min=1, max=100, required=False)

  # Feature template list - Priority 6
  feature_template_list: list(str(), min=1, max=100, required=False)

  # Additional interface list - Priority 7 (LOWEST)
  additional_interface_list: list(str(), min=1, max=100, required=False)
