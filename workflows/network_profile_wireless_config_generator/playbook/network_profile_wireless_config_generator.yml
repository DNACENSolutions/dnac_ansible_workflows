---
- name: Generate Network Profile Wireless Configuration
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no

  vars:
    state: gathered
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalyst_center_version | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(catalystcenter_verify) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(false) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(false) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path | default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append | default(True) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout | default(1200) }}"

  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Build candidate paths for VARS_FILE_PATH
      ansible.builtin.set_fact:
        vars_file_candidates:
          - "{{ VARS_FILE_PATH }}"
          - "{{ playbook_dir }}/{{ VARS_FILE_PATH }}"
          - "{{ playbook_dir }}/../{{ VARS_FILE_PATH }}"
          - "{{ playbook_dir }}/../../{{ VARS_FILE_PATH }}"
          - "{{ playbook_dir }}/../../../{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Check VARS_FILE_PATH candidates on controller
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ vars_file_candidates }}"
      register: vars_file_candidate_stats
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Resolve VARS_FILE_PATH to first existing file
      ansible.builtin.set_fact:
        resolved_vars_file_path: >-
          {{
            (
              vars_file_candidate_stats.results
              | selectattr('stat.exists', 'equalto', true)
              | map(attribute='item')
              | list
              | first
            ) | default('')
          }}
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Fail when provided VARS_FILE_PATH cannot be resolved
      ansible.builtin.fail:
        msg: >-
          Could not resolve VARS_FILE_PATH '{{ VARS_FILE_PATH }}' on controller.
          Checked: {{ vars_file_candidates }}
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0
        - resolved_vars_file_path | default('') | length == 0

    - name: Load input variables from vars file when VARS_FILE_PATH is resolved
      ansible.builtin.include_vars:
        file: "{{ resolved_vars_file_path }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ resolved_vars_file_path
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that network_profile_wireless_config is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'network_profile_wireless_config' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: network_profile_wireless_config is not defined

    # =========================================================================
    # Playbook execution
    # =========================================================================
    - name: Playbook start time for network profile wireless configuration generation
      ansible.builtin.set_fact:
        config_gen_start: "{{ now() }}"

    - name: Generate YAML configuration for network profile wireless
      cisco.catalystcenter.network_profile_wireless_playbook_config_generator:
        <<: *catalyst_center_login
        state: "{{ state }}"
        file_path: "{{ item.file_path | default(omit) }}"
        file_mode: "{{ item.file_mode | default('overwrite') }}"
        config: >-
          {{
            item.config
            if ((item.config | default({})) | length > 0)
            else omit
          }}
      loop: "{{ network_profile_wireless_config }}"
      when:
        - network_profile_wireless_config is defined
        - network_profile_wireless_config | length > 0
      register: config_generation_result

    - name: Display configuration generation results
      ansible.builtin.debug:
        var: config_generation_result
      when: config_generation_result is defined

    # =========================================================================
    # Playbook Execution Summary
    # =========================================================================
    - name: Playbook end time
      ansible.builtin.set_fact:
        config_gen_end: "{{ now() }}"

    - name: Print playbook execution time
      ansible.builtin.debug:
        msg: "Network profile wireless configuration generation playbook run time: start: {{ config_gen_start }}, end: {{ config_gen_end }}"
