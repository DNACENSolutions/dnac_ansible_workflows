---
# ============================================================================
# Cisco Catalyst Center Network Profile Wireless Config Generator
# ============================================================================
#
# Usage:
#   ansible-playbook -i inventory/demo_lab/hosts.yaml \
#     workflows/network_profile_wireless_config_generator/playbook/network_profile_wireless_config_generator.yml \
#     --extra-vars VARS_FILE_PATH=./workflows/network_profile_wireless_config_generator/vars/network_profile_wireless_config_generator_inputs.yml
#
# Notes:
# - Omit `config` to retrieve all wireless profiles.
# - When `config` is provided, `global_filters` is mandatory.
# - Filter processing is priority-based (only one filter type is applied per item):
#   profile_name_list > day_n_template_list > site_list > ssid_list >
#   ap_zone_list > feature_template_list > additional_interface_list
# ============================================================================

network_profile_wireless_config:

  # Filter by wireless profile names (Priority 1 - HIGHEST)
  - file_path: "network_profile_wireless/profile_name_list.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        profile_name_list:
          - "Campus_Wireless_Profile"
          - "Enterprise_Wireless_Profile"

  # Filter by Day-N templates (Priority 2)
  - file_path: "network_profile_wireless/day_n_template_list.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        day_n_template_list:
          - "Periodic_Config_Audit"
          - "Security_Compliance_Check"

  # Filter by site hierarchies (Priority 3)
  - file_path: "network_profile_wireless/site_list.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        site_list:
          - "Global/India/Chennai/Main_Office"
          - "Global/USA/San_Francisco/Regional_HQ"

  # Filter by SSIDs (Priority 4)
  - file_path: "network_profile_wireless/ssid_list.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        ssid_list:
          - "Guest_WiFi"
          - "Corporate_WiFi"

  # Filter by AP zones (Priority 5)
  - file_path: "network_profile_wireless/ap_zone_list.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        ap_zone_list:
          - "Branch_AP_Zone"
          - "HQ_AP_Zone"

  # Filter by feature templates (Priority 6)
  - file_path: "network_profile_wireless/feature_template_list.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        feature_template_list:
          - "Default AAA_Radius_Attributes_Configuration"
          - "Default CleanAir 6GHz Design"

  # Filter by additional interfaces (Priority 7 - LOWEST)
  - file_path: "network_profile_wireless/additional_interface_list.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        additional_interface_list:
          - "VLAN_22"
          - "GigabitEthernet0/2"

  # Filter priority behavior example:
  # profile_name_list is applied, site_list is ignored for this item.
  - file_path: "network_profile_wireless/priority_behavior.yml"
    file_mode: "overwrite"
    config:
      global_filters:
        profile_name_list:
          - "Campus_Wireless_Profile"
        site_list:
          - "Global/USA/SAN JOSE/SJ_BLD20/FLOOR3"

# ============================================================================
# Additional Configuration Examples
# ============================================================================

