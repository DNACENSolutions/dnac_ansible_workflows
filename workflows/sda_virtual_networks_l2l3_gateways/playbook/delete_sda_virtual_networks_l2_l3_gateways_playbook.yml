#sda_fabric_virtual_networks_workflow_manager
# Delete layer2 Fabric VLAN(s) for SDA operations in Cisco Catalyst Center.
#cisco.catalystcenter.sda_fabric_virtual_networks_workflow_manager
# Requirements:
#   - Cisco Catalyst Center (DNAC) version: 2.3.7.6 (minimum version)
---
- name: Playbook to manage Cisco Catalyst Center Fabric Virtual Networks and layer2 and L3 Gateways
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: no


  vars:
    state: deleted
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(catalystcenter_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(catalystcenter_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(catalystcenter_password) }}"
      catalystcenter_version: "{{ catalyst_center_version  | default(catalystcenter_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(catalystcenter_verify) }}"
      config_verify: "{{ catalyst_center_config_verify | default(False) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(False) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(False) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path |  default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append |  default(False) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout |  default(1200) }}"
      
  tasks:
    # =========================================================================
    # Input loading: vars file (VARS_FILE_PATH) or inventory variables
    # =========================================================================
    - name: Load input variables from vars file when VARS_FILE_PATH is provided
      ansible.builtin.include_vars:
        file: "{{ VARS_FILE_PATH }}"
      when:
        - VARS_FILE_PATH is defined
        - VARS_FILE_PATH | length > 0

    - name: Print input source
      ansible.builtin.debug:
        msg: >-
          {{
            'Input source: vars file ' ~ VARS_FILE_PATH
            if (VARS_FILE_PATH is defined and VARS_FILE_PATH | length > 0)
            else 'Input source: inventory / host variables (VARS_FILE_PATH not provided)'
          }}

    - name: Validate that sda_fabric_virtual_networks_details is defined
      ansible.builtin.fail:
        msg: >-
          Variable 'sda_fabric_virtual_networks_details' is not defined.
          Provide it via VARS_FILE_PATH or as an inventory/host variable.
      when: sda_fabric_virtual_networks_details is not defined

    - name: SDA Fabric Virtual Networks and L2/L3 Gateways Playbook start time
      set_fact:
        long_op_start: "{{ now() }}"
    # load sda fabric virtual networks and l2/l3 gateways template jinja file
    - debug:
        msg: "version: {{ catalyst_center_version }}"
    - name: Create Template
      template: 
        src: "{{ jinjatemplate_file }}"
        dest: ../tmp/template_generated_file.yaml
      when:  jinjatemplate is defined and jinjatemplate is true and jinjatemplate_file is defined
    # Include the variables file ../tmp/template_generated_file.yaml for the playbook
    - name: Include the variables file ../tmp/template_generated_file.yaml for the playbook
      include_vars:
        file: ../tmp/template_generated_file.yaml
      when: jinjatemplate is defined and jinjatemplate is true and jinjatemplate_file is defined
    # Create, update, or delete layer2 Fabric VLAN(s) for SDA operations in Cisco Catalyst Center
    - name: Delete Fabric VLAN(s) for SDA operations in Cisco Catalyst Center
      cisco.catalystcenter.sda_fabric_virtual_networks_workflow_manager:
        <<: *catalyst_center_login
        state: "{{state}}"
        config: "{{sda_fabric_virtual_networks_details}}"
      register: sda_fabric_virtual_networks_output
      when: sda_fabric_virtual_networks_details is defined and sda_fabric_virtual_networks_details | length > 0
    # Print the layer2 Fabric VLAN(s) creation output
    - name: Print the layer2 Fabric VLAN(s) creation output
      debug:
        msg: "{{sda_fabric_virtual_networks_output}}"
    # delete the template file
    - name: Delete the template file
      ansible.builtin.command: rm ../tmp/template_generated_file.yaml
      when:  jinjatemplate is defined and jinjatemplate is true and jinjatemplate_file is defined
    # SDA Fabric Virtual Networks and L2/L3 Gateways playbook end time
    - name: SDA Fabric Virtual Networks and L2/L3 Gateways playbook end time
      set_fact:
        long_op_end: "{{ now() }}"
    # Print SDA Fabric Virtual Networks and L2/L3 Gateways execution time
    - name: Print SDA Fabric Virtual Networks and L2/L3 Gateways execution time
      debug:
        msg: "SDA Fabric Virtual Networks and L2/L3 Gateways playbook run time: {{ long_op_start }}, end: {{ long_op_end }}"
  post_tasks:
    - name: run command module to find python version
      ansible.builtin.command: which python
      register: ansible_play_path
      delegate_to: catalyst_center_hosts
      connection: local
